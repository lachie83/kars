# cargo-audit configuration
# See: https://docs.rs/cargo-audit/latest/cargo_audit/#configuration

[advisories]
ignore = [
    # RUSTSEC-2026-0097 ‚Äî `rand` is unsound with a custom logger using `rand::rng()`
    # https://rustsec.org/advisories/RUSTSEC-2026-0097
    #
    # Severity: informational ("unsound"), NOT a vulnerability.
    # Source: transitive dependency ‚Äî `agentmesh 3.1.0` pins `rand = "=0.8.5"` exactly.
    #   Our own direct deps are already on `rand = "0.9"` (patched).
    # Exploitation requires ALL of:
    #   1. A custom `log::Log` implementation is installed.
    #   2. That logger calls `rand::rng()` (or `rand::thread_rng()`).
    #   3. Trace-level logging is enabled AND a `TryRng`/`RngCore` method is invoked
    #      from inside the logger during a `ThreadRng` reseed (every 64 KiB).
    # Our inference-router uses `tracing-subscriber` (not `log::Log`) and no logger
    # implementation accesses `rand`. The upstream `agentmesh` crate uses `rand` only
    # for nonce/key generation, none of it from inside a logger.
    # TODO: remove once `agentmesh` ships a release with `rand >= 0.8.6`.
    "RUSTSEC-2026-0097",
    # RUSTSEC-2023-0071 ‚Äî Marvin Attack: potential key recovery in `rsa` via timing sidechannels
    # https://rustsec.org/advisories/RUSTSEC-2023-0071
    #
    # Severity: medium (CVSS 5.9). NO upstream fix is available.
    # Source: transitive dependency ‚Äî `jsonwebtoken 10.3.0` ‚Üí `rsa 0.9.10`.
    # The Marvin attack requires *RSA private key operations* whose timing leaks
    # to a co-located attacker. AzureClaw's only RSA usage is **JWT signature
    # verification on JWKS-published public keys** (OAuth 2.1 access-token
    # validation in `inference-router/src/mcp/oauth.rs`). Public-key verification
    # does not exercise the vulnerable scalar-multiplication path; we never hold
    # an RSA private key in router or controller code. Defence-in-depth: the
    # OAuth verifier additionally enforces alg allow-listing (`RS256`/`PS256`/
    # `EdDSA` only ‚Äî no `none`, no algorithm confusion), kid pinning, and
    # JWKS-cache bounds, so even a compromised RSA public key cannot widen the
    # surface.
    # TODO: drop this ignore when `jsonwebtoken` switches to a non-vulnerable
    # RSA backend (tracked upstream: https://github.com/Keats/jsonwebtoken).
    "RUSTSEC-2023-0071",
    # RUSTSEC-2024-0370 ‚Äî `proc-macro-error 1.0.4` is unmaintained
    # https://rustsec.org/advisories/RUSTSEC-2024-0370
    #
    # Severity: informational ("unmaintained"), NOT a vulnerability.
    # Source: transitive dependency chain (S12.b, controller-only):
    #   sigstore 0.13.0 ‚Üí json-syntax 0.12.5 ‚Üí locspan-derive 0.6.0 (proc-macro)
    #     ‚Üí proc-macro-error 1.0.4
    # `proc-macro-error` is a build-time-only crate (proc-macro). It runs at compile
    # time inside `rustc`, not at runtime in the controller binary. There is no
    # runtime attack surface from an unmaintained proc-macro crate beyond the build
    # toolchain itself.
    # The successor `proc-macro-error2` exists; sigstore-rs has not yet rolled
    # forward (tracked upstream: https://github.com/sigstore/sigstore-rs).
    # TODO: drop this ignore when `sigstore` switches off `json-syntax`/`locspan-derive`
    # or those crates adopt `proc-macro-error2`.
    "RUSTSEC-2024-0370",
]
