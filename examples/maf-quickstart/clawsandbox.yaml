# Kars Example: Microsoft Agent Framework (MAF) runtime
#
# Hosts a Microsoft Agent Framework (Python) agent inside an Kars
# sandbox. The controller swaps the OpenClaw image for
# `sandbox-images/maf-python/` and points MAF's Azure OpenAI client at the
# local inference router. Egress guard, AGT governance, AgentMesh E2E,
# and seccomp/Landlock isolation are identical to the OpenClaw default.
#
# Apply with:
#   kubectl apply -f examples/maf-quickstart/karssandbox.yaml
#
# Pre-reqs:
#   - Kars control plane installed (`kars up`)
#   - InferencePolicy below references an Azure OpenAI deployment named
#     `gpt-4.1`. Adjust if needed.
#   - You publish your MAF agent code to an OCI registry and replace the
#     `REPLACE-ME/your-maf-agent:latest` placeholder below. There is no
#     upstream image — this YAML will not pull as-is. Use `git:` instead
#     of `oci:` for dev iteration without a container build.

---
apiVersion: kars.azure.com/v1alpha1
kind: InferencePolicy
metadata:
  name: maf-quickstart-inference
  namespace: kars-system
  labels:
    kars.azure.com/sandbox: maf-quickstart
spec:
  appliesTo:
    sandboxName: maf-quickstart
  modelPreference:
    primary:
      provider: azure-openai
      deployment: gpt-4.1
  contentSafety:
    requirePromptShields: true
  tokenBudget:
    dailyTokens: 500000
    perRequestTokens: 128000
---
apiVersion: kars.azure.com/v1alpha1
kind: KarsSandbox
metadata:
  name: maf-quickstart
  namespace: kars-system
spec:
  runtime:
    kind: MicrosoftAgentFramework
    microsoftAgentFramework:
      # Phase 2 ships the Python adapter. `dotnet` is reserved in the CRD
      # but its adapter image ships in Phase 3.
      language: python
      agentCode:
        oci:
          # REPLACE this with the image you built and pushed for your
          # MAF agent. There is no upstream `ghcr.io/microsoft/maf-quickstart`
          # image — this is a placeholder. Use `git:` instead of `oci:` for
          # in-repo iteration without rebuilding a container.
          image: REPLACE-ME/your-maf-agent:latest
      # entrypoint: ["python", "-u", "agent.py"]
      extraEnv:
        AGENT_LOG_LEVEL: "INFO"

  sandbox:
    isolation: "enhanced"
    seccompProfile: "kars-strict"
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    writablePaths:
      - /sandbox
      - /tmp

  inferenceRef:
    name: maf-quickstart-inference

  networkPolicy:
    defaultDeny: true
    allowedEndpoints: []

  azureServices:
    - service: ai-foundry
      permissions: [inference]

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
