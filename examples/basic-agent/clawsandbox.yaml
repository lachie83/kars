# AzureClaw Example: Basic OpenClaw Agent
# This creates a sandboxed OpenClaw agent with default security settings.

---
# S13: ClawSandbox.spec.inferenceRef points at this sibling InferencePolicy.
apiVersion: azureclaw.azure.com/v1alpha1
kind: InferencePolicy
metadata:
  name: my-assistant-inference
  namespace: azureclaw-system
  labels:
    azureclaw.azure.com/sandbox: my-assistant
spec:
  appliesTo:
    sandboxName: my-assistant
  modelPreference:
    primary:
      provider: azure-openai
      deployment: gpt-4.1
  contentSafety:
    requirePromptShields: true
  tokenBudget:
    dailyTokens: 500000
    perRequestTokens: 128000
---
apiVersion: azureclaw.azure.com/v1alpha1
kind: ClawSandbox
metadata:
  name: my-assistant
  namespace: azureclaw-system
spec:
  runtime:
    kind: OpenClaw
    openclaw:
      version: "2026.3.13"
      image: azureclaw.azurecr.io/openclaw-sandbox:latest
      config:
        agent:
          model: "azure/gpt-4.1"

  sandbox:
    isolation: "enhanced"
    seccompProfile: "azureclaw-strict"
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    writablePaths:
      - /sandbox
      - /tmp

  # S13 phase2-config-authority-refs: inline `inference:` is gone — the
  # spec now references a sibling InferencePolicy CR by name (above).
  inferenceRef:
    name: my-assistant-inference

  networkPolicy:
    defaultDeny: true
    allowedEndpoints:
      - host: "github.com"
        port: 443
      - host: "api.github.com"
        port: 443
    # clawhub.com intentionally excluded — 12% malware rate.
    # Skills must be curated at build time, not downloaded at runtime.

  # Azure services accessible from inside the sandbox via Managed Identity
  azureServices:
    - service: ai-foundry
      permissions: [inference, evaluate]

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
