# AzureClaw Example: Confidential Agent
# Uses Kata VM isolation for per-pod dedicated kernel.
# Container escape attacks are trapped inside the VM, not the host.

apiVersion: azureclaw.azure.com/v1alpha1
kind: ClawSandbox
metadata:
  name: confidential-assistant
  namespace: azureclaw-system
spec:
  runtime:
    kind: OpenClaw
    openclaw:
      version: "2026.3.13"
      image: azureclaw.azurecr.io/openclaw-sandbox:latest
      config:
        agent:
          model: "azure/gpt-4.1"

  sandbox:
    isolation: "confidential"        # Kata VM with dedicated kernel
    seccompProfile: "azureclaw-strict"
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    writablePaths:
      - /sandbox
      - /tmp

  inference:
    provider: "azure-openai"
    model: "gpt-4.1"
    contentSafety: true
    promptShields: true
    tokenBudget:
      daily: 1000000
      perRequest: 128000

  networkPolicy:
    defaultDeny: true
    approvalRequired: true
    allowedEndpoints:
      - host: "github.com"
        port: 443
        methods: ["GET"]
      - host: "api.github.com"
        port: 443
        methods: ["GET", "POST", "PATCH"]

  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
