# AzureClaw Example: Confidential Agent
# Uses AMD SEV-SNP Confidential Containers for hardware-level isolation.
# Even the cloud operator cannot read the agent's memory.

apiVersion: azureclaw.azure.com/v1alpha1
kind: ClawSandbox
metadata:
  name: confidential-assistant
  namespace: azureclaw-system
spec:
  openclaw:
    version: "2026.3.13"
    image: azureclaw.azurecr.io/openclaw-sandbox:latest
    config:
      agent:
        model: "azure/gpt-4.1"

  sandbox:
    isolation: "confidential"        # Hardware-encrypted TEE
    seccompProfile: "azureclaw-strict"
    selinuxContext: "azureclaw_sandbox_t"
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    writablePaths:
      - /sandbox
      - /tmp

  inference:
    provider: "azure-openai"
    model: "gpt-4.1"
    contentSafety: true
    promptShields: true
    tokenBudget:
      daily: 1000000
      perRequest: 128000

  networkPolicy:
    defaultDeny: true
    approvalRequired: true
    allowedEndpoints:
      - host: "github.com"
        port: 443
        methods: ["GET"]
      - host: "api.github.com"
        port: 443
        methods: ["GET", "POST", "PATCH"]

  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
