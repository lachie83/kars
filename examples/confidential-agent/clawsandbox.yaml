# Kars Example: Confidential Agent
# Uses Kata VM isolation for per-pod dedicated kernel.
# Container escape attacks are trapped inside the VM, not the host.

---
apiVersion: kars.azure.com/v1alpha1
kind: InferencePolicy
metadata:
  name: confidential-assistant-inference
  namespace: kars-system
  labels:
    kars.azure.com/sandbox: confidential-assistant
spec:
  appliesTo:
    sandboxName: confidential-assistant
  modelPreference:
    primary:
      provider: azure-openai
      deployment: gpt-4.1
  contentSafety:
    requirePromptShields: true
  tokenBudget:
    dailyTokens: 1000000
    perRequestTokens: 128000
---
apiVersion: kars.azure.com/v1alpha1
kind: KarsSandbox
metadata:
  name: confidential-assistant
  namespace: kars-system
spec:
  runtime:
    kind: OpenClaw
    openclaw:
      # Image and version intentionally unset: the controller resolves
      # the sandbox image from its SANDBOX_IMAGE env (set by `kars
      # up`). Pinning a registry path here breaks the example for users
      # who haven't pushed to the same registry.
      config:
        agent:
          model: "azure/gpt-4.1"

  sandbox:
    isolation: "confidential"        # Kata VM with dedicated kernel
    seccompProfile: "kars-strict"
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    writablePaths:
      - /sandbox
      - /tmp

  inferenceRef:
    name: confidential-assistant-inference

  networkPolicy:
    defaultDeny: true
    allowedEndpoints:
      - host: "github.com"
        port: 443
      - host: "api.github.com"
        port: 443

  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
