# BYO quickstart sandbox.
#
# The image must meet the contract documented in
# docs/byo-runtime-contract.md. With controller.byoStrict=true the
# AzureClaw controller verifies that:
#   * spec.runtime.byo.contractVersion is in {"v1", "1", "1.0"}
#   * spec.runtime.byo.image looks like a valid image reference
#     (host/path:tag or host/path@sha256:...)
#
# Registry-side label introspection (verifying the image actually
# carries `org.azureclaw.runtime.contract=v1`) is a Phase 4 add-on;
# CR-level enforcement alone catches the most common operator
# mistakes (typoed version, missing tag) at admission time.
---
apiVersion: azureclaw.azure.com/v1alpha1
kind: InferencePolicy
metadata:
  name: byo-quickstart
  namespace: azureclaw-system
  labels:
    azureclaw.azure.com/sandbox: byo-quickstart
spec:
  appliesTo:
    sandboxName: byo-quickstart
  modelPreference:
    primary:
      provider: azure-openai
      deployment: gpt-4.1
  tokenBudget:
    perRequestTokens: 4000
    dailyTokens: 200000
---
apiVersion: azureclaw.azure.com/v1alpha1
kind: ClawSandbox
metadata:
  name: byo-quickstart
  namespace: azureclaw-system
spec:
  runtime:
    kind: BYO
    byo:
      image: REPLACE_ME            # e.g. ghcr.io/your-org/byo-quickstart:v1
      contractVersion: v1
  sandbox:
    isolation: standard
  inferenceRef:
    name: byo-quickstart
