# 00-namespace.yaml — dedicated namespace for the single-agent Hermes
# variant of exec-brief.
#
# The sandbox pod runs in kars-execbrief-hermes; the namespace is
# pre-created so the credentials Secret (telegram-bot-token if
# enabled) can land before the controller reconciles the sandbox.
---
apiVersion: v1
kind: Namespace
metadata:
  name: kars-execbrief-hermes
  labels:
    kars.azure.com/sandbox: execbrief-hermes
    kars.azure.com/managed-by: exec-brief-hermes-single-e2e
