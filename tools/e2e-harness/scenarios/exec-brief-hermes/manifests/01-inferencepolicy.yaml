# 01-inferencepolicy.yaml — Foundry/AOAI provider for the multi-agent
# exec-brief-hermes scenario. The parent spawns 3 sub-agents (analyst,
# viz, writer) at runtime via kars_spawn; sub-agents are spawned as
# Hermes too (the controller's spawn endpoint reads KARS_RUNTIME_KIND
# from the parent router env). Each child gets its OWN
# `<child>-inference` policy — auto-generated by re-applying this
# pattern with the kars_spawn convention `<parent>-inference` →
# `<child>-inference`.
#
# The single parent policy below covers all four agents because the
# spawn helper references `<parent>-inference` literally. For Hermes
# children spawned by kars_spawn, the router-side
# build_sub_agent_crd_with_labels sets inferenceRef to
# "<parent>-inference" which already points at this CR. So one CR is
# enough.
---
apiVersion: kars.azure.com/v1alpha1
kind: InferencePolicy
metadata:
  name: execbrief-hermes-multi-inference
  namespace: kars-system
  labels:
    kars.azure.com/sandbox: execbrief-hermes-multi
spec:
  appliesTo:
    sandboxMatchLabels:
      kars.azure.com/sandbox: execbrief-hermes-multi
  modelPreference:
    primary:
      provider: azure-openai
      deployment: gpt-5.4
  contentSafety:
    # See exec-brief/01-inferencepolicy.yaml — Foundry data-plane stream
    # doesn't emit prompt_filter_results, so strict Prompt Shields
    # would always fail open.
    requirePromptShields: false
  tokenBudget:
    # Parent orchestrates 3 sub-agents which each do real work
    # (foundry_web_search, code_execute, image_generate) → generous
    # cap so analyst's research loop doesn't trip mid-run.
    dailyTokens: 4000000
    perRequestTokens: 200000
