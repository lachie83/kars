# 03-karsmemory.yaml — Foundry Memory Store binding for the exec-brief
# sandbox. Lets the analyst persist its JSON artifact so later
# sub-agent invocations (or a retry) can pick it up without re-running
# the web search.
#
# Provisioning: the controller drives Memory Store creation on the
# Foundry project (project MI must have "Azure AI User" on the resource
# group — see docs/api/crd-reference.md KarsMemory section). The
# project MI is what authenticates the internal model calls Memory Store
# makes during update_memories / search_memories — the user's RBAC alone
# is not enough.
---
apiVersion: kars.azure.com/v1alpha1
kind: KarsMemory
metadata:
  name: execbrief-memory
  namespace: kars-system
  labels:
    kars.azure.com/sandbox: execbrief
spec:
  # storeName: DNS-label, becomes the Foundry Memory Store partition for
  # everything this sandbox writes. Required when bundleRef is absent.
  storeName: execbrief-store
  sandboxRef:
    name: execbrief
  # Project-scoped: every agent in the execbrief sandbox sees the same
  # memory store. Use "sandbox" for stricter isolation when running
  # production agents that should not share state across runs.
  scope: project
  # Auto-cleanup of stale runs.
  retentionDays: 7
  # Delete the Memory Store when the sandbox is deleted (this is an
  # ephemeral e2e harness, not production data).
  deleteOnSandboxDelete: true
  displayName: "Exec-brief e2e shared memory"
