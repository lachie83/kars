# 00-namespace.yaml — dedicated namespace for the exec-brief e2e sandbox.
#
# The controller installs KarsSandbox / InferencePolicy / ToolPolicy /
# KarsMemory / McpServer CRs in kars-system, but the actual sandbox
# pod runs in kars-<sandbox-name>. We pre-create that namespace so
# the credentials Secret (telegram-bot-token) can land before the
# controller reconciles the sandbox.
---
apiVersion: v1
kind: Namespace
metadata:
  name: kars-execbrief
  labels:
    kars.azure.com/sandbox: execbrief
    kars.azure.com/managed-by: exec-brief-e2e
