# Demo scenario step 2 — ToolPolicy gates a sensitive tool.
#
# Demonstrates approval-required path: an outbound HTTP tool needs
# explicit approval (channel = Telegram) before the router lets it
# through. ToolPolicy CRDs are one tool per CR; deploy one per gate.
---
apiVersion: azureclaw.azure.com/v1alpha1
kind: ToolPolicy
metadata:
  name: demo-web-fetch
  namespace: azureclaw-system
spec:
  appliesTo:
    tool: "web.fetch"
    sandboxMatchLabels:
      azureclaw.azure.com/sandbox: demo-agent
  approval:
    mode: "always"
    channel: "telegram"
  rateLimit:
    rps: 1
    burst: 3
    window: "1m"
  displayName: "Demo web.fetch gate (approval-required)"

