apiVersion: v1
kind: Namespace
metadata:
  name: agentmesh
  labels:
    app.kubernetes.io/managed-by: azureclaw
---
# PostgreSQL credentials — auto-generated by `azureclaw up`.
# If deploying manually, create the secret first:
#   kubectl create secret generic agentmesh-db-credentials \
#     -n agentmesh \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -base64 32)"
---
# PostgreSQL for the AGT registry
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: agentmesh
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: agentmesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: azureclawacr.azurecr.io/postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: agentmesh
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentmesh-db-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: agentmesh
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [sh, -c, "pg_isready -U agentmesh"]
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: [sh, -c, "pg_ctl stop -D $PGDATA -m fast -w -t 45"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: agentmesh
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# AGT Registry API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: agentmesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentmesh-registry
  template:
    metadata:
      labels:
        app: agentmesh-registry
    spec:
      containers:
        - name: registry
          image: azureclawacr.azurecr.io/agentmesh-registry:latest
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentmesh-db-credentials
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgres://agentmesh:$(POSTGRES_PASSWORD)@postgres.agentmesh.svc.cluster.local:5432/agentmesh
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: RUST_LOG
              value: agentmesh_registry=info,actix_web=info
            # OAuth credentials (optional — from agentmesh-oauth-credentials secret)
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: agentmesh-oauth-credentials
                  key: GITHUB_CLIENT_ID
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agentmesh-oauth-credentials
                  key: GITHUB_CLIENT_SECRET
                  optional: true
            - name: ENTRA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: agentmesh-oauth-credentials
                  key: ENTRA_CLIENT_ID
                  optional: true
            - name: ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agentmesh-oauth-credentials
                  key: ENTRA_CLIENT_SECRET
                  optional: true
            - name: ENTRA_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: agentmesh-oauth-credentials
                  key: ENTRA_TENANT_ID
                  optional: true
            # Set by azureclaw up --expose-registry (public domain for OAuth callbacks)
            # - name: OAUTH_CALLBACK_BASE_URL
            #   value: "https://registry.<domain>"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agentmesh-registry
  namespace: agentmesh
spec:
  selector:
    app: agentmesh-registry
  ports:
    - port: 8080
      targetPort: 8080
---
# AGT Relay Server (WebSocket)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay
  namespace: agentmesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentmesh-relay
  template:
    metadata:
      labels:
        app: agentmesh-relay
    spec:
      containers:
        - name: relay
          image: azureclawacr.azurecr.io/agentmesh-relay:latest
          ports:
            - containerPort: 8765
          env:
            - name: RUST_LOG
              value: agentmesh_relay=info
            - name: RELAY_ADDR
              value: "0.0.0.0:8765"
            # Registry URL for agent registration verification
            - name: REGISTRY_URL
              value: "http://agentmesh-registry.agentmesh.svc.cluster.local:8080"
            # When true, relay verifies connecting agents are registered
            - name: REQUIRE_REGISTRATION
              value: "true"
          readinessProbe:
            tcpSocket:
              port: 8765
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agentmesh-relay
  namespace: agentmesh
spec:
  selector:
    app: agentmesh-relay
  ports:
    - port: 8765
      targetPort: 8765
