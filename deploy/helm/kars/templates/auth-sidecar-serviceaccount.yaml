{{- /*
ServiceAccount for the shared Microsoft Entra SDK auth-sidecar.

The sidecar runs ONCE per cluster (Helm-managed Deployment, 2 replicas
for HA) and serves token-acquisition requests from all sandbox
inference-routers via the `?AgentIdentity=<appId>` query parameter.

The SA carries Azure Workload Identity annotations so AKS projects
a federated token into the sidecar pod at
`/var/run/secrets/azure/tokens/azure-identity-token`. The sidecar
uses that token as the `client_assertion` against the blueprint's
FIC to acquire blueprint tokens, then derives child agent identity
tokens on demand.

In OSS / non-restricted tenants, the FIC on the blueprint trusts:
  issuer:  <AKS OIDC issuer URL>
  subject: system:serviceaccount:kars-system:entra-auth-sidecar
This is the Workload Identity (Pattern B) flow.

In Microsoft-corporate / restricted tenants where blueprints reject
the AKS OIDC issuer (AADSTS verified live 2026-05-28), the FIC subject
is the controller MI's principalId and the sidecar's SourceType is
`SignedAssertionFromManagedIdentity`. The CLI's setup-trust command
detects this case and configures both ends consistently — see
`cli/src/commands/mesh/agent_id_setup.ts`.

Conditionally rendered: only when `.Values.entraSidecar.enabled` is
true. Default off so existing kars installs aren't disrupted.
*/}}
{{- if .Values.entraSidecar.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: entra-auth-sidecar
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kars
    app.kubernetes.io/component: entra-auth-sidecar
    app.kubernetes.io/managed-by: helm
  annotations:
    # `azure.workload.identity/client-id` is REQUIRED by the AKS
    # azure-wi-webhook to project a federated SA token. The value
    # must equal the blueprint application's appId so the sidecar
    # authenticates AS the blueprint when calling Entra.
    azure.workload.identity/client-id: {{ .Values.entraSidecar.blueprintClientId | quote }}
    # `tenant-id` lets the webhook project an SA token with the
    # right tenant audience for FIC validation.
    azure.workload.identity/tenant-id: {{ .Values.entraSidecar.tenantId | quote }}
{{- end }}
