# kars InferencePolicy CRD
#
# DO NOT EDIT BY HAND. This file is the helm-side mirror of the Rust
# schema in `controller/src/inference_policy.rs` plus the CEL rules in
# `controller/src/crd_validations.rs::inference_policy_validations`.
#
# Drift between this file and the Rust schema is caught at `cargo test`
# time by `controller/src/helm_drift.rs::helm_inferencepolicy_crd_matches_rust_schema`.
# To regenerate after schema changes, run:
#
#   DUMP_INFERENCEPOLICY_CRD_YAML=1 cargo test --bin kars-controller \
#       helm_drift::tests::dump_inferencepolicy_crd_yaml -- --nocapture
#
# and replace the body below with the captured YAML.
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: inferencepolicies.kars.azure.com
  labels:
    app.kubernetes.io/name: kars
    app.kubernetes.io/component: crd
spec:
  group: kars.azure.com
  names:
    categories: []
    kind: InferencePolicy
    plural: inferencepolicies
    shortNames:
    - ip
    singular: inferencepolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.appliesTo.sandboxName
      name: Sandbox
      type: string
    - jsonPath: .spec.tokenBudget.dailyTokens
      name: DailyTokens
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for InferencePolicySpec via `CustomResource`
        properties:
          spec:
            description: |-
              `InferencePolicy.spec` â€” declares per-sandbox inference-time
              guardrails: token budgets, Content Safety severity floors, model
              preference + fallback chain.

              Resolution rule (precedence): same as ToolPolicy â€” most-specific
              `appliesTo` selector wins. See `docs/api/lifecycle.md` for
              resolution semantics. The compiled profile carries the unmodified
              selector; precedence resolution is router-side.
            properties:
              appliesTo:
                description: |-
                  Selector: which sandboxes / inference call sites this policy
                  applies to. AND of fields.
                properties:
                  action:
                    description: |-
                      Inference action filter: one of `chat` / `responses` /
                      `image` / `embeddings` / `*` (default). Maps to the call sites
                      in `inference-router/src/routes/inference.rs`.
                    nullable: true
                    type: string
                  sandboxMatchLabels:
                    additionalProperties:
                      type: string
                    default: {}
                    description: Sandbox label selector. AND with `sandboxName`.
                    type: object
                  sandboxName:
                    description: |-
                      Exact sandbox name (`KarsSandbox.metadata.name`). Empty means
                      any sandbox in the namespace.
                    nullable: true
                    type: string
                type: object
              bundleRef:
                description: |-
                  Signed OCI artifact reference. The controller pulls the
                  artifact from `<registry>/<repository>@<digest>`, verifies the
                  cosign signature against the active
                  [`crate::signer_policy::SignerPolicy`], re-validates the JSON
                  structure ([`crate::policy_canonical::inference::InferenceKind`]),
                  and synthesises the effective spec by combining the CR's
                  `appliesTo` selector with the bundle's `tokenBudget` /
                  `contentSafety` / `modelPreference` / `displayName` content
                  fields. The same compile + ConfigMap write path runs as for
                  inline specs â€” only the source of the content bytes differs.

                  On any verification failure the controller stamps
                  `Ready=False / reason=AllowlistMissing|AllowlistMalformed|
                  AllowlistUnauthorized|AllowlistSignatureVerifyFailed` (the
                  same `FetchError` variants used by egress + tools â€” one
                  error taxonomy across all signed-policy kinds).

                  Artifact `artifactType` MUST be
                  `application/vnd.kars.inference-policy.v1+json`; a
                  mismatch surfaces as `Ready=False / reason=InvalidRef`.

                  Mutually exclusive with the inline content fields
                  (`tokenBudget`, `contentSafety`, `modelPreference`,
                  `displayName`). `appliesTo` always comes from the CR so one
                  signed bundle can be referenced by multiple CRs with
                  different selectors. See
                  `docs/internal/policy-canonical-format.md`.
                nullable: true
                properties:
                  artifactType:
                    description: |-
                      OCI artifactType media-type, e.g.
                      `application/vnd.kars.egress-allowlist.v1+yaml`. Consumers MUST
                      reject artifacts whose pulled `artifactType` doesn't match.
                    type: string
                  digest:
                    description: |-
                      Content-addressed digest, including the algorithm prefix
                      (`sha256:abcâ€¦`). The digest covers the canonical artifact bytes â€”
                      see `docs/internal/policy-canonical-format.md` for the egress-allowlist
                      canonicalization rules.
                    type: string
                  registry:
                    description: Registry hostname (e.g. `myacr.azurecr.io`, `ghcr.io`).
                    type: string
                  repository:
                    description: Repository path (e.g. `kars/policies/sandbox-foo`).
                    type: string
                required:
                - artifactType
                - digest
                - registry
                - repository
                type: object
              contentSafety:
                description: |-
                  Content Safety severity floor. Optional â€” absent â‡’ governance
                  minimum (router-default) applies. The VAP referenced in Â§7.14
                  rejects changes that *lower* the floor below the cluster
                  minimum. Mutually exclusive with [`Self::bundle_ref`].
                nullable: true
                properties:
                  hate:
                    description: Hate speech severity floor.
                    nullable: true
                    type: string
                  requirePromptShields:
                    description: |-
                      Whether to require Prompt Shields (jailbreak / indirect
                      injection) be enabled by the upstream. The router fails-closed
                      if Prompt Shields are advertised by the deployment but the
                      response lacks the corresponding annotations.
                    nullable: true
                    type: boolean
                  selfHarm:
                    description: Self-harm severity floor.
                    nullable: true
                    type: string
                  sexual:
                    description: Sexual content severity floor.
                    nullable: true
                    type: string
                  violence:
                    description: Violence severity floor.
                    nullable: true
                    type: string
                type: object
              displayName:
                description: |-
                  Optional human-readable label. Mutually exclusive with
                  [`Self::bundle_ref`] â€” when `bundleRef` is set, the label
                  comes from the signed bundle.
                nullable: true
                type: string
              modelPreference:
                description: |-
                  Model preference + fallback chain. Optional. **Not** a router:
                  only declares preferred route order; selection is delegated to
                  the underlying provider. Mutually exclusive with
                  [`Self::bundle_ref`].
                nullable: true
                properties:
                  fallback:
                    default: []
                    description: Ordered fallback routes. Tried in order on primary failure.
                    items:
                      description: |-
                        Reference to a Foundry route. Combination of provider tag (one of
                        `azure-openai` / `anthropic` / `gemini` / `bedrock` / `ollama`) and
                        deployment name. The router resolves to the actual base URL using
                        its existing per-provider configuration.
                      properties:
                        deployment:
                          description: Deployment name as advertised by the provider.
                          type: string
                        provider:
                          description: Provider tag.
                          type: string
                      required:
                      - deployment
                      - provider
                      type: object
                    type: array
                  primary:
                    description: Primary preferred route.
                    properties:
                      deployment:
                        description: Deployment name as advertised by the provider.
                        type: string
                      provider:
                        description: Provider tag.
                        type: string
                    required:
                    - deployment
                    - provider
                    type: object
                required:
                - primary
                type: object
              tokenBudget:
                description: |-
                  Token-budget caps. Optional â€” absent â‡’ no budget enforcement.

                  Mutually exclusive with [`Self::bundle_ref`]: when `bundleRef`
                  is set, the budget caps come from the signed bundle. Admission
                  CEL + reconciler defense-in-depth both reject specs that set
                  any of `tokenBudget`/`contentSafety`/`modelPreference`/
                  `displayName` alongside `bundleRef`.
                nullable: true
                properties:
                  dailyTokens:
                    description: Daily aggregate cap (sum of input + output tokens).
                    format: uint64
                    minimum: 0.0
                    nullable: true
                    type: integer
                  monthlyTokens:
                    description: Monthly aggregate cap. Must be >= dailyTokens (admission CEL).
                    format: uint64
                    minimum: 0.0
                    nullable: true
                    type: integer
                  perRequestTokens:
                    description: |-
                      Per-request hard cap. Single inference call exceeding this is
                      refused before the upstream forward.
                    format: uint64
                    minimum: 0.0
                    nullable: true
                    type: integer
                type: object
            required:
            - appliesTo
            type: object
            x-kubernetes-validations:
            - message: spec.bundleRef is mutually exclusive with spec.tokenBudget, spec.contentSafety, spec.modelPreference, and spec.displayName; the bundle carries those content fields
              reason: FieldValueInvalid
              rule: '!has(self.bundleRef) || (!has(self.tokenBudget) && !has(self.contentSafety) && !has(self.modelPreference) && !has(self.displayName))'
            - message: spec.tokenBudget.monthlyTokens must be >= spec.tokenBudget.dailyTokens
              reason: FieldValueInvalid
              rule: '!has(self.tokenBudget) || !has(self.tokenBudget.monthlyTokens) || !has(self.tokenBudget.dailyTokens) || self.tokenBudget.monthlyTokens >= self.tokenBudget.dailyTokens'
            - message: spec.tokenBudget.monthlyTokens must be >= spec.tokenBudget.perRequestTokens
              reason: FieldValueInvalid
              rule: '!has(self.tokenBudget) || !has(self.tokenBudget.monthlyTokens) || !has(self.tokenBudget.perRequestTokens) || self.tokenBudget.monthlyTokens >= self.tokenBudget.perRequestTokens'
            - message: 'spec.contentSafety severities must be one of: Safe, Low, Medium, High'
              reason: FieldValueInvalid
              rule: '!has(self.contentSafety) || ((!has(self.contentSafety.hate)      || self.contentSafety.hate      in [''Safe'',''Low'',''Medium'',''High'']) && (!has(self.contentSafety.selfHarm)  || self.contentSafety.selfHarm  in [''Safe'',''Low'',''Medium'',''High'']) && (!has(self.contentSafety.sexual)    || self.contentSafety.sexual    in [''Safe'',''Low'',''Medium'',''High'']) && (!has(self.contentSafety.violence)  || self.contentSafety.violence  in [''Safe'',''Low'',''Medium'',''High'']))'
            - message: spec.modelPreference.primary requires non-empty provider and deployment
              reason: FieldValueInvalid
              rule: '!has(self.modelPreference) || (size(self.modelPreference.primary.provider) > 0 && size(self.modelPreference.primary.deployment) > 0)'
            - message: spec.modelPreference.fallback[*] requires non-empty provider and deployment
              reason: FieldValueInvalid
              rule: '!has(self.modelPreference) || self.modelPreference.fallback.all(f, size(f.provider) > 0 && size(f.deployment) > 0)'
            - message: 'spec.appliesTo.action must be one of: chat, responses, image, embeddings, *'
              reason: FieldValueInvalid
              rule: '!has(self.appliesTo.action) || self.appliesTo.action in [''chat'',''responses'',''image'',''embeddings'',''*'']'
          status:
            description: Status of an `InferencePolicy` reconcile.
            nullable: true
            properties:
              bundleRefDigest:
                description: |-
                  OCI manifest digest of the verified `spec.bundleRef` artifact
                  when the bundleRef path was taken; `None` for inline specs.
                  Stamped after [`crate::policy_fetcher::fetch_and_verify_generic`]
                  returns `Ok`, so its presence is operator-visible proof that
                  the controller actually verified the signed artifact (vs.
                  taking an inline shortcut). Distinct from `compiled_digest`
                  (the wire-contract value the router echoes) â€” `bundle_ref_digest`
                  is the supply-chain identifier. Slice 1c.3 of
                  `crd-well-oiled-machine`.
                nullable: true
                type: string
              compiledDigest:
                description: |-
                  `sha256:<full hex>` digest the controller wrote to the
                  compiled-profile ConfigMap and the annotation
                  `kars.azure.com/inference-policy-digest`. Computed by
                  `inference_policy_compile::inference_policy_digest` from the
                  canonical bytes of `inference-policy.json`. Distinct from
                  `version_hash` (16-byte legacy short-hash kept for
                  `PolicyEntry.version` change-detection): this full digest is
                  the **wire-contract value** the router echoes back via
                  `GET /internal/policy-status`.

                  `phase=Ready` is only stamped when this matches
                  `loaded_digest` on every sandbox that references the policy.
                  (Slice 2a of `crd-well-oiled-machine`.)
                nullable: true
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition. This may be an empty string.
                      type: string
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                nullable: true
                type: array
              lastCompiledAt:
                description: Last time the policy was compiled and pushed.
                nullable: true
                type: string
              loadedDigest:
                description: |-
                  Digest most recently echoed by referencing sandbox routers
                  via `GET /internal/policy-status`. When this equals
                  `compiled_digest` for every referencing sandbox, the
                  reconciler promotes `phase=Compiled â†’ Ready` with reason
                  `RouterEnforcing`. While mismatched (or while no sandbox
                  references the policy), the reconciler stamps
                  `Ready=False / AwaitingRouterEnforcement` and emits a
                  `PolicyNotEnforced` Warning Event. (Slice 2a of
                  `crd-well-oiled-machine`.)
                nullable: true
                type: string
              observedGeneration:
                description: '`metadata.generation` last successfully reconciled. KEP-1623.'
                format: int64
                nullable: true
                type: integer
              phase:
                nullable: true
                type: string
              profileConfigMapRef:
                description: |-
                  Pointer to the compiled-profile `ConfigMap` produced by the
                  reconciler. The router-side informer (S7) watches by label
                  selector; this status field is for human / CLI consumption.
                nullable: true
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              versionHash:
                description: |-
                  Hex-encoded sha256 prefix of the compiled profile JSON. Stable
                  under serde round-trip (canonical key order). Same input â‡’
                  same hash; immune to map-reordering.
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: InferencePolicy
        type: object
    served: true
    storage: true
    subresources:
      status: {}

