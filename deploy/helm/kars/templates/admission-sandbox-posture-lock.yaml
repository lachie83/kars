{{- /*
  Phase 1 deliverable (implementation-plan.md §7 item 13 / "core VAP set").

  ValidatingAdmissionPolicy that blocks posture *downgrades* on pods
  inside sandbox namespaces (namespaces labelled
  kars.azure.com/isolated=strict). Applied on UPDATE only; CREATE
  is handled by the controller's own pod template, which already
  stamps the correct posture.

  Downgrades blocked:
   * flipping readOnlyRootFilesystem from true → false on any container
   * dropping runAsNonRoot from true → false
   * removing seccompProfile from pod or container
   * setting privileged=true
   * setting allowPrivilegeEscalation=true
   * dropping any NET_RAW / SYS_ADMIN capability drop (adding them
     back via capabilities.add)

  A compromised workload identity or controller bug that tries to
  relax the sandbox posture is caught here instead of landing in the
  cluster.

  CEL notes
  ---------
  * `oldObject` is populated on UPDATE. We compare old vs new.
  * `containers` means both pod.spec.containers and
     pod.spec.initContainers. ephemeralContainers are blocked outright
     elsewhere (they are the canonical "escape hatch" — an
     ephemeralContainer can join an existing pod's PID/net namespace
     with different securityContext). The apiserver routes ephemeral
     container creation to the `pods/ephemeralcontainers` subresource;
     the pod-exec-ban VAP already denies CONNECT subresources in
     sandbox namespaces, and a separate rule here denies UPDATEs that
     add ephemeralContainers.
*/}}
{{- if .Values.admission.sandboxPostureLock.enabled -}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kars-sandbox-posture-lock
  labels:
    app.kubernetes.io/name: kars
    app.kubernetes.io/component: admission
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   [""]
        apiVersions: ["v1"]
        operations:  ["UPDATE"]
        resources:   ["pods"]
    namespaceSelector:
      matchLabels:
        kars.azure.com/isolated: strict
  variables:
    - name: allContainersNew
      expression: |
        (object.spec.?containers.orValue([])) +
        (object.spec.?initContainers.orValue([]))
    - name: allContainersOld
      expression: |
        (oldObject.spec.?containers.orValue([])) +
        (oldObject.spec.?initContainers.orValue([]))
    - name: privilegedSetNew
      expression: |
        variables.allContainersNew.exists(c,
          c.?securityContext.?privileged.orValue(false) == true)
    - name: privilegedSetOld
      expression: |
        variables.allContainersOld.exists(c,
          c.?securityContext.?privileged.orValue(false) == true)
    - name: privilegedAdded
      expression: |
        variables.privilegedSetNew && !variables.privilegedSetOld
    - name: privEscSetNew
      expression: |
        variables.allContainersNew.exists(c,
          c.?securityContext.?allowPrivilegeEscalation.orValue(false) == true)
    - name: privEscSetOld
      expression: |
        variables.allContainersOld.exists(c,
          c.?securityContext.?allowPrivilegeEscalation.orValue(false) == true)
    - name: privEscAdded
      expression: |
        variables.privEscSetNew && !variables.privEscSetOld
    - name: rofsFalseNew
      expression: |
        variables.allContainersNew.exists(nc,
          nc.?securityContext.?readOnlyRootFilesystem.orValue(true) == false)
    - name: rofsFalseOld
      expression: |
        variables.allContainersOld.exists(oc,
          oc.?securityContext.?readOnlyRootFilesystem.orValue(true) == false)
    - name: rofsDowngraded
      expression: |
        variables.rofsFalseNew && !variables.rofsFalseOld
    - name: runAsNonRootFalseNew
      expression: |
        object.spec.?securityContext.?runAsNonRoot.orValue(true) == false ||
        variables.allContainersNew.exists(nc,
          nc.?securityContext.?runAsNonRoot.orValue(true) == false)
    - name: runAsNonRootFalseOld
      expression: |
        oldObject.spec.?securityContext.?runAsNonRoot.orValue(true) == false ||
        variables.allContainersOld.exists(oc,
          oc.?securityContext.?runAsNonRoot.orValue(true) == false)
    - name: runAsNonRootDowngraded
      expression: |
        variables.runAsNonRootFalseNew && !variables.runAsNonRootFalseOld
    - name: seccompRemovedNew
      expression: |
        !has(object.spec.securityContext) ||
        !has(object.spec.securityContext.seccompProfile) ||
        variables.allContainersNew.exists(nc,
          has(nc.securityContext) && has(nc.securityContext.seccompProfile) &&
          nc.securityContext.seccompProfile.type == 'Unconfined')
    - name: seccompRemovedOld
      expression: |
        !has(oldObject.spec.securityContext) ||
        !has(oldObject.spec.securityContext.seccompProfile) ||
        variables.allContainersOld.exists(oc,
          has(oc.securityContext) && has(oc.securityContext.seccompProfile) &&
          oc.securityContext.seccompProfile.type == 'Unconfined')
    - name: seccompDowngraded
      expression: |
        variables.seccompRemovedNew && !variables.seccompRemovedOld
    - name: ephemeralAdded
      expression: |
        size(object.spec.?ephemeralContainers.orValue([])) >
        size(oldObject.spec.?ephemeralContainers.orValue([]))
  validations:
    # All checks are TRUE-DELTAS (oldObject was OK → object is NOT OK).
    # Critical reason: bare absolute checks (the previous shape) fire on
    # EVERY pod UPDATE — including PATCH operations that only modify
    # metadata.finalizers. CronJob pods complete with the
    # `batch.kubernetes.io/job-tracking` finalizer that the controller
    # must REMOVE for the pod to reap. If those pods have any (legacy)
    # field that fails the absolute check, the finalizer-removal PATCH
    # is blocked → pod stuck Terminating → namespace stuck Terminating
    # → `kars destroy` is broken forever. Delta checks let pods that
    # were created in a (legacy, dangerous, since-fixed) shape die
    # gracefully without ever being re-validated against the new rules.
    - expression: "!variables.privilegedAdded"
      message: "privileged=true cannot be ADDED to a kars sandbox pod via UPDATE (delta check)"
      reason: Forbidden
    - expression: "!variables.privEscAdded"
      message: "allowPrivilegeEscalation=true cannot be ADDED to a kars sandbox pod via UPDATE (delta check)"
      reason: Forbidden
    - expression: "!variables.rofsDowngraded"
      message: "readOnlyRootFilesystem=true cannot be downgraded to false via UPDATE (delta check)"
      reason: Forbidden
    - expression: "!variables.runAsNonRootDowngraded"
      message: "runAsNonRoot=true cannot be downgraded to false via UPDATE (delta check)"
      reason: Forbidden
    - expression: "!variables.seccompDowngraded"
      message: "seccompProfile cannot be removed/Unconfined'd via UPDATE (delta check)"
      reason: Forbidden
    - expression: "!variables.ephemeralAdded"
      message: "ephemeralContainers are not permitted in kars sandbox namespaces"
      reason: Forbidden
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: kars-sandbox-posture-lock-binding
  labels:
    app.kubernetes.io/name: kars
    app.kubernetes.io/component: admission
spec:
  policyName: kars-sandbox-posture-lock
  validationActions: [Deny, Audit]
{{- end }}
