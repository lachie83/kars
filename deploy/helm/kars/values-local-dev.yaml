# Local development overlay for kind-based dev mode.
#
# Usage (the CLI does this for you — see cli/src/commands/dev/local-k8s.ts):
#   helm install kars ./deploy/helm/kars \
#     -f deploy/helm/kars/values.yaml \
#     -f deploy/helm/kars/values-local-dev.yaml \
#     -f <per-run dynamic overlay with creds + endpoint>
#
# This file is what makes the Helm chart usable on a laptop:
#   * pulls images from the local kind node cache (no ACR access)
#   * cuts replicas to 1 so a single-node kind cluster doesn't
#     pile up Pending pods
#   * disables Foundry-only features (Content Safety, Prompt Shields)
#     because there is no Azure backend in local-k8s mode
#   * keeps the controller alive without a leader-election pair
#
# This file does NOT set inferenceRouter.azure.openai.endpoint or any
# credentials — those are written into a per-run overlay by the CLI from
# `loadConfig()` (Foundry / GitHub Models / GitHub Copilot). The router
# image is the real `kars-inference-router` (same as AKS); only the
# auth path differs (API key instead of workload identity, auto-detected
# in `inference-router/src/auth.rs`).
#
# Production values.yaml stays untouched.

controller:
  image:
    repository: kars-controller
    tag: "dev"
    pullPolicy: Never
  replicas: 1
  # Single-replica controllers must skip leader election or the
  # deployment will deadlock on Lease acquisition in a 1-node cluster.
  # Real inference creds (AZURE_OPENAI_ENDPOINT / AZURE_OPENAI_API_KEY /
  # KARS_PROVIDER / COPILOT_GITHUB_TOKEN) are appended in the
  # per-run dynamic overlay built by the CLI.
  extraEnv:
    - name: LEADER_ELECTION_ENABLED
      value: "false"
    # Tells the reconciler this is a dev cluster: imagePullPolicy
    # defaults to IfNotPresent for `:latest` tags (so kind-loaded
    # images aren't blown away by a network pull attempt against
    # karsacr.azurecr.io), plus a handful of other dev-relaxations
    # (see controller/src/reconciler/dev_env.rs). Previously this
    # was only added by `kars dev`'s dynamic per-run overlay
    # (cli/src/commands/dev/local-k8s.ts:944), which meant any
    # naked `helm template ... -f values-local-dev.yaml | kubectl
    # apply` (e.g. an out-of-band CRD refresh) silently dropped
    # this env from the controller — and every subsequent sandbox
    # spawn would ErrImagePull against ACR because the kubelet was
    # told to always re-pull. Pinning it here means anyone who
    # applies the local-dev overlay gets the dev semantics, full
    # stop. The CLI's dynamic overlay still re-emits the same key
    # idempotently; helm/kubectl deduplicate on `name`.
    - name: KARS_DEV_PROFILE
      value: "true"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

inferenceRouter:
  image:
    repository: kars-inference-router
    tag: "dev"
    pullPolicy: Never
  replicas: 1
  azure:
    contentSafety:
      enabled: false
    promptShields:
      enabled: false
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

sandbox:
  image:
    repository: kars-sandbox
    tag: "dev"
    pullPolicy: Never
