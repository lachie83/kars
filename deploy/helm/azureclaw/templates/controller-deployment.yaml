apiVersion: apps/v1
kind: Deployment
metadata:
  name: azureclaw-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: azureclaw
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: azureclaw
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: azureclaw
        app.kubernetes.io/component: controller
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: azureclaw-controller
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: {{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: RUST_LOG
              value: "info,azureclaw_controller=debug"
            # Downward API — used by leader-election + S12.d
            # SignerPolicy watcher to scope to the controller's own
            # namespace without cluster-wide watch RBAC.
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AZURE_WI_CLIENT_ID
              value: {{ .Values.azure.workloadIdentity.clientId | quote }}
            {{- if .Values.controller.byoStrict }}
            - name: BYO_STRICT_MODE
              value: "1"
            {{- end }}
            {{- if .Values.egress.requireSigned }}
            # Slice 5c.2: when true, the controller rejects sandboxes
            # whose `spec.networkPolicy.allowedEndpoints` is set without
            # a signed `spec.networkPolicy.allowlistRef`. Default
            # `false` — inline-only allowlists are allowed but stamped
            # `AllowlistVerified=False/Unsigned` as a warning.
            - name: REQUIRE_SIGNED_ALLOWLIST
              value: "true"
            {{- end }}
            - name: INFERENCE_ROUTER_IMAGE
              value: "{{ .Values.inferenceRouter.image.repository }}:{{ .Values.inferenceRouter.image.tag }}"
            - name: SANDBOX_IMAGE
              value: "{{ .Values.sandbox.image.repository }}:{{ .Values.sandbox.image.tag }}"
            # Multi-runtime adapter image overrides (consumed by
            # controller/src/reconciler/runtime.rs::*_default_image()).
            # Empty string keeps the controller's compiled-in default.
            - name: OPENAI_AGENTS_RUNTIME_IMAGE
              value: {{ .Values.runtimes.openaiAgents.image | default "" | quote }}
            - name: MAF_RUNTIME_IMAGE
              value: {{ .Values.runtimes.mafPython.image | default "" | quote }}
            - name: ANTHROPIC_RUNTIME_IMAGE
              value: {{ .Values.runtimes.anthropic.image | default "" | quote }}
            - name: LANGGRAPH_RUNTIME_IMAGE
              value: {{ .Values.runtimes.langgraph.image | default "" | quote }}
            - name: LANGGRAPH_TS_RUNTIME_IMAGE
              value: {{ .Values.runtimes.langgraphTs.image | default "" | quote }}
            - name: PYDANTIC_AI_RUNTIME_IMAGE
              value: {{ .Values.runtimes.pydanticAi.image | default "" | quote }}
            - name: AZURE_OPENAI_ENDPOINT
              value: {{ .Values.inferenceRouter.azure.openai.endpoint | quote }}
            - name: FOUNDRY_ENDPOINT
              value: {{ .Values.foundry.endpoint | default "" | quote }}
            - name: FOUNDRY_PROJECT_ENDPOINT
              value: {{ .Values.foundry.projectEndpoint | default "" | quote }}
            - name: FOUNDRY_DEPLOYMENTS
              value: {{ .Values.foundry.deployments | default "" | quote }}
            - name: IMDS_CLIENT_ID
              value: {{ .Values.foundry.imdsClientId | default "" | quote }}
            - name: CONTENT_SAFETY_ENDPOINT
              value: {{ .Values.contentSafety.endpoint | default .Values.foundry.endpoint | default "" | quote }}
            {{- if .Values.fedcred }}
            - name: AZURE_SUBSCRIPTION_ID
              value: {{ .Values.fedcred.subscriptionId | default "" | quote }}
            - name: IDENTITY_NAME
              value: {{ .Values.fedcred.identityName | default "" | quote }}
            - name: IDENTITY_RESOURCE_GROUP
              value: {{ .Values.fedcred.identityResourceGroup | default "" | quote }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.fedcred.oidcIssuerUrl | default "" | quote }}
            {{- end }}
            # Mesh federation
            - name: MESH_PEER_ENABLED
              value: {{ .Values.meshPeer.enabled | quote }}
            {{- if .Values.meshPeer.relayUrl }}
            - name: MESH_RELAY_URL
              value: {{ .Values.meshPeer.relayUrl | quote }}
            {{- end }}
            {{- if .Values.meshPeer.clusterName }}
            - name: CLUSTER_NAME
              value: {{ .Values.meshPeer.clusterName | quote }}
            {{- end }}
            # Entra Agent ID kill switch — see values.yaml `azure.entraAuth`.
            # Controller passes this through to every sandbox as
            # AGT_SKIP_ENTRA so doomed token-exchange retries don't
            # delay sub-agent startup on clusters without the Entra app
            # registration provisioned.
            - name: AZURECLAW_DISABLE_ENTRA_AUTH
              value: {{ if .Values.azure.entraAuth.enabled }}"0"{{ else }}"1"{{ end }}
            # Mesh transport — passed through to every sandbox as
            # AZURECLAW_MESH_PROVIDER. Only "agt" (upstream
            # @microsoft/agent-governance-sdk + Microsoft AGT relay/registry,
            # deploy/agentmesh-agt.yaml) is supported since Phase 5.2. The
            # vendored fork was removed.
            - name: AZURECLAW_MESH_PROVIDER
              value: {{ .Values.mesh.provider | default "agt" | quote }}
            # Strict-mode tool definitions: when enabled, sandbox openclaw
            # containers receive AZURECLAW_STRICT_TOOLS=1, which causes the
            # task-loop to emit OpenAI strict-mode tool schemas
            # (`strict: true` + `additionalProperties: false` + all params
            # required). Eliminates the multi-KB string-escape corruption
            # failure class on tool-call arguments. The runtime additionally
            # gates this on a GPT-family model (gpt-4o/4.1/5, o1/o3/o4) and
            # non-slim provider, so Anthropic / Claude / Gemini deployments
            # via Foundry's OpenAI-compat shim are auto-excluded. Default
            # OFF for backward compatibility.
            {{- if .Values.strictTools.enabled }}
            - name: AZURECLAW_STRICT_TOOLS
              value: "1"
            {{- end }}
            {{- with .Values.controller.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Writable /tmp for sigstore-rs TUF trust-root unpacking
            # (tough crate creates a tempdir for the repository datastore
            # during `SigstoreTrustRoot::new`; rootfs is read-only).
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: {{ .Values.controller.resources.requests.cpu | quote }}
              memory: {{ .Values.controller.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.controller.resources.limits.cpu | quote }}
              memory: {{ .Values.controller.resources.limits.memory | quote }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "test -f /proc/1/status"]
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["sh", "-c", "test -f /proc/1/status"]
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
