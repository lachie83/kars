apiVersion: apps/v1
kind: Deployment
metadata:
  name: azureclaw-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: azureclaw
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: azureclaw
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: azureclaw
        app.kubernetes.io/component: controller
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: azureclaw-controller
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: {{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: RUST_LOG
              value: "info,azureclaw_controller=debug"
            # Downward API — used by leader-election + S12.d
            # SignerPolicy watcher to scope to the controller's own
            # namespace without cluster-wide watch RBAC.
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AZURE_WI_CLIENT_ID
              value: {{ .Values.azure.workloadIdentity.clientId | quote }}
            {{- if .Values.controller.byoStrict }}
            - name: BYO_STRICT_MODE
              value: "1"
            {{- end }}
            - name: INFERENCE_ROUTER_IMAGE
              value: "{{ .Values.inferenceRouter.image.repository }}:{{ .Values.inferenceRouter.image.tag }}"
            - name: SANDBOX_IMAGE
              value: "{{ .Values.sandbox.image.repository }}:{{ .Values.sandbox.image.tag }}"
            - name: AZURE_OPENAI_ENDPOINT
              value: {{ .Values.inferenceRouter.azure.openai.endpoint | quote }}
            - name: FOUNDRY_ENDPOINT
              value: {{ .Values.foundry.endpoint | default "" | quote }}
            - name: FOUNDRY_PROJECT_ENDPOINT
              value: {{ .Values.foundry.projectEndpoint | default "" | quote }}
            - name: FOUNDRY_DEPLOYMENTS
              value: {{ .Values.foundry.deployments | default "" | quote }}
            - name: IMDS_CLIENT_ID
              value: {{ .Values.foundry.imdsClientId | default "" | quote }}
            - name: CONTENT_SAFETY_ENDPOINT
              value: {{ .Values.contentSafety.endpoint | default .Values.foundry.endpoint | default "" | quote }}
            {{- if .Values.fedcred }}
            - name: AZURE_SUBSCRIPTION_ID
              value: {{ .Values.fedcred.subscriptionId | default "" | quote }}
            - name: IDENTITY_NAME
              value: {{ .Values.fedcred.identityName | default "" | quote }}
            - name: IDENTITY_RESOURCE_GROUP
              value: {{ .Values.fedcred.identityResourceGroup | default "" | quote }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.fedcred.oidcIssuerUrl | default "" | quote }}
            {{- end }}
            # Mesh federation
            - name: MESH_PEER_ENABLED
              value: {{ .Values.meshPeer.enabled | quote }}
            {{- if .Values.meshPeer.relayUrl }}
            - name: MESH_RELAY_URL
              value: {{ .Values.meshPeer.relayUrl | quote }}
            {{- end }}
            {{- if .Values.meshPeer.clusterName }}
            - name: CLUSTER_NAME
              value: {{ .Values.meshPeer.clusterName | quote }}
            {{- end }}
            # Entra Agent ID kill switch — see values.yaml `azure.entraAuth`.
            # Controller passes this through to every sandbox as
            # AGT_SKIP_ENTRA so doomed token-exchange retries don't
            # delay sub-agent startup on clusters without the Entra app
            # registration provisioned.
            - name: AZURECLAW_DISABLE_ENTRA_AUTH
              value: {{ if .Values.azure.entraAuth.enabled }}"0"{{ else }}"1"{{ end }}
            {{- with .Values.controller.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 9091
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: {{ .Values.controller.resources.requests.cpu | quote }}
              memory: {{ .Values.controller.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.controller.resources.limits.cpu | quote }}
              memory: {{ .Values.controller.resources.limits.memory | quote }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "test -f /proc/1/status"]
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["sh", "-c", "test -f /proc/1/status"]
            initialDelaySeconds: 3
            periodSeconds: 10
