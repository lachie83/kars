---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clawevals.azureclaw.azure.com
  labels:
    app.kubernetes.io/name: azureclaw
    app.kubernetes.io/component: crd
spec:
  group: azureclaw.azure.com
  names:
    categories: []
    kind: ClawEval
    plural: clawevals
    shortNames:
    - ceval
    singular: claweval
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetSandboxRef.name
      name: Sandbox
      type: string
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.lastRunAt
      name: LastRun
      type: date
    - jsonPath: .status.lastResult.passed
      name: Passed
      type: integer
    - jsonPath: .status.lastResult.failed
      name: Failed
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for ClawEvalSpec via `CustomResource`
        properties:
          spec:
            description: '`ClawEval.spec` — declares a conformance run over a sandbox.'
            properties:
              corpus:
                description: |-
                  Source of the corpus to replay. Exactly one variant must be set;
                  CEL admission enforces the mutex.
                properties:
                  builtin:
                    description: |-
                      Name of a builtin corpus shipped with the controller. See
                      `azureclaw_eval_corpus::builtin::ALL_NAMES`.
                    nullable: true
                    type: string
                  bundleRef:
                    description: Reference to a signed OCI artifact carrying a corpus.
                    nullable: true
                    properties:
                      artifactType:
                        description: |-
                          OCI artifactType media-type, e.g.
                          `application/vnd.azureclaw.egress-allowlist.v1+yaml`. Consumers MUST
                          reject artifacts whose pulled `artifactType` doesn't match.
                        type: string
                      digest:
                        description: |-
                          Content-addressed digest, including the algorithm prefix
                          (`sha256:abc…`). The digest covers the canonical artifact bytes —
                          see `docs/internal/policy-canonical-format.md` for the egress-allowlist
                          canonicalization rules.
                        type: string
                      registry:
                        description: Registry hostname (e.g. `myacr.azurecr.io`, `ghcr.io`).
                        type: string
                      repository:
                        description: Repository path (e.g. `azureclaw/policies/sandbox-foo`).
                        type: string
                    required:
                    - artifactType
                    - digest
                    - registry
                    - repository
                    type: object
                type: object
              displayName:
                description: Optional human-readable label surfaced in CLI output.
                nullable: true
                type: string
              failSandboxOnDrift:
                description: |-
                  When `true`, a failing run patches the target `ClawSandbox`'s
                  `Degraded` condition (reason `ConformanceDrift`) via a distinct
                  field manager. The sandbox reconciler will then refuse to admit
                  new agent sessions until the next successful eval clears the
                  condition.

                  Defaults to `false` so first-time operators can adopt the CRD
                  without immediately taking sandboxes offline on a corpus update.
                nullable: true
                type: boolean
              runnerImage:
                description: |-
                  Optional override of the conformance-runner container image. When
                  absent the controller falls back to the Helm-configured default
                  (`AZURECLAW_CONFORMANCE_RUNNER_IMAGE` env). Setting this on a CR
                  is an escape hatch for in-cluster development; production should
                  pin the image globally via the Helm chart.
                nullable: true
                type: string
              schedule:
                description: |-
                  Optional cron schedule (5-token form, K8s `CronJob.spec.schedule`
                  shape). When empty/absent, the eval runs only when an operator
                  adds the `azureclaw.azure.com/run-now=true` annotation.
                nullable: true
                type: string
              targetSandboxRef:
                description: Sandbox this eval applies to. Must live in the same namespace.
                properties:
                  name:
                    description: Sandbox name (`ClawSandbox.metadata.name`).
                    type: string
                required:
                - name
                type: object
            required:
            - corpus
            - targetSandboxRef
            type: object
            x-kubernetes-validations:
            - message: spec.targetSandboxRef.name must be 1-253 characters
              reason: FieldValueInvalid
              rule: size(self.targetSandboxRef.name) > 0 && size(self.targetSandboxRef.name) <= 253
            - message: spec.corpus must set exactly one of `builtin` or `bundleRef` (mutually exclusive)
              reason: FieldValueInvalid
              rule: has(self.corpus.builtin) != has(self.corpus.bundleRef)
            - message: spec.corpus.builtin, when set, must be 1-253 characters
              reason: FieldValueInvalid
              rule: '!has(self.corpus.builtin) || (size(self.corpus.builtin) > 0 && size(self.corpus.builtin) <= 253)'
            - message: spec.schedule, when set, must be a 5-or-6-field cron expression (1-256 chars)
              reason: FieldValueInvalid
              rule: '!has(self.schedule) || (size(self.schedule) > 0 && size(self.schedule) <= 256 && (size(self.schedule.split('' '')) == 5 || size(self.schedule.split('' '')) == 6))'
            - message: spec.displayName, when set, must be 1-256 characters
              reason: FieldValueInvalid
              rule: '!has(self.displayName) || (size(self.displayName) > 0 && size(self.displayName) <= 256)'
            - message: spec.runnerImage, when set, must be 1-512 characters
              reason: FieldValueInvalid
              rule: '!has(self.runnerImage) || (size(self.runnerImage) > 0 && size(self.runnerImage) <= 512)'
          status:
            description: '`ClawEval.status`.'
            nullable: true
            properties:
              conditions:
                description: |-
                  Standard K8s conditions. Includes `Ready`, `Progressing`,
                  `Degraded`, plus the eval-specific `ConformanceDrift` condition
                  (`True` when the most recent run reported any failed case).
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition. This may be an empty string.
                      type: string
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                nullable: true
                type: array
              corpusConfigMapRef:
                description: Pointer to the corpus `ConfigMap` produced by the reconciler.
                nullable: true
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              corpusDigest:
                description: |-
                  Hex `sha256:` digest of the resolved corpus bytes (matches the
                  digest computed by `eval_corpus::parse_corpus`).
                nullable: true
                type: string
              cronJobName:
                description: |-
                  When `spec.schedule` is set, name of the controller-owned
                  `CronJob` that fires periodic runs.
                nullable: true
                type: string
              history:
                description: |-
                  Summaries of the previous [`MAX_HISTORY`] runs, newest-first. The
                  entry at index 0 is also reflected in `last_result`.
                items:
                  description: |-
                    Compact summary kept in `status.history`. The most-recent entry
                    matches `last_result.{schema_version, corpus_digest, total, passed,
                    failed, errored, last_run_at}`.
                  properties:
                    at:
                      description: RFC 3339 completion timestamp.
                      type: string
                    corpusDigest:
                      type: string
                    errored:
                      format: uint32
                      minimum: 0.0
                      type: integer
                    failed:
                      format: uint32
                      minimum: 0.0
                      type: integer
                    jobName:
                      type: string
                    passed:
                      format: uint32
                      minimum: 0.0
                      type: integer
                    total:
                      format: uint32
                      minimum: 0.0
                      type: integer
                  required:
                  - at
                  - corpusDigest
                  - errored
                  - failed
                  - jobName
                  - passed
                  - total
                  type: object
                type: array
              lastResult:
                description: Detailed result of the most recent run.
                nullable: true
                properties:
                  corpusDigest:
                    description: Hex `sha256:` digest of the corpus that produced this run.
                    type: string
                  corpusLabel:
                    description: |-
                      Name of the corpus (`builtin` name, or the `repository@digest`
                      of the bundle).
                    type: string
                  errored:
                    description: Cases the runner could not exercise (transport error, timeout).
                    format: uint32
                    minimum: 0.0
                    type: integer
                  failed:
                    description: Cases whose actual decision did NOT match the expected verdict.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  firstFailingCases:
                    description: |-
                      Up to 5 first-failing case IDs surfaced for at-a-glance triage.
                      The full per-case detail lives in the runner log.
                    items:
                      type: string
                    type: array
                  jobName:
                    description: |-
                      Name of the K8s `Job` that produced this run. Operators use this
                      to fetch the full runner log via `kubectl logs`.
                    type: string
                  passed:
                    description: Cases whose actual decision matched the expected verdict.
                    format: uint32
                    minimum: 0.0
                    type: integer
                  schemaVersion:
                    description: |-
                      Schema version of the runner `RunReport` consumed. Matches
                      `azureclaw_conformance_runner::report::REPORT_SCHEMA_VERSION`.
                    type: string
                  total:
                    description: Total cases the runner attempted.
                    format: uint32
                    minimum: 0.0
                    type: integer
                required:
                - corpusDigest
                - corpusLabel
                - errored
                - failed
                - jobName
                - passed
                - schemaVersion
                - total
                type: object
              lastRunAt:
                description: |-
                  RFC 3339 timestamp of the last completed run, written when the
                  reconciler successfully reads the runner pod log and parses the
                  `RunReport`.
                nullable: true
                type: string
              observedGeneration:
                format: int64
                nullable: true
                type: integer
              phase:
                description: 'One of: `Pending`, `Running`, `Ready`, `Degraded`.'
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: ClawEval
        type: object
    served: true
    storage: true
    subresources:
      status: {}

