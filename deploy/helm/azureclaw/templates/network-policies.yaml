# Default NetworkPolicy template for sandbox namespaces
# Stored as a ConfigMap — the controller reads this as the base policy
# and applies it per-sandbox namespace, merging with CRD-defined allowedEndpoints
apiVersion: v1
kind: ConfigMap
metadata:
  name: azureclaw-default-network-policy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: azureclaw
    app.kubernetes.io/component: policy-template
data:
  default-policy.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: sandbox-policy
    spec:
      podSelector:
        matchLabels:
          azureclaw.azure.com/component: sandbox
      policyTypes:
        - Egress
        - Ingress
      egress:
        # Allow DNS resolution
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kube-system
          ports:
            - protocol: UDP
              port: 53
            - protocol: TCP
              port: 53
        # Allow traffic to inference router sidecar (localhost)
        - to:
            - podSelector:
                matchLabels:
                  azureclaw.azure.com/component: sandbox
          ports:
            - protocol: TCP
              port: 8443
      ingress:
        - from:
            - podSelector:
                matchLabels:
                  azureclaw.azure.com/component: sandbox
          ports:
            - protocol: TCP
              port: 18789
