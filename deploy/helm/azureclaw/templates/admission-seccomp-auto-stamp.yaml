{{- /*
  Phase 1 deliverable (implementation-plan.md §7 item 13 / "core MAP set").

  MutatingAdmissionPolicy that auto-stamps the azureclaw-strict seccomp
  profile onto sandbox-namespace pods that are missing it.

  Rationale
  ---------
  ClawSandbox reconcilers always set seccompProfile on pods they own.
  But agent runtimes (post-Phase 3 partner adapters) may produce pod
  templates that omit the field. Defense-in-depth: the cluster itself
  guarantees the strict seccomp profile lands, even if the controller
  gets it wrong, even if a future adapter forgets.

  Note: Kubernetes 1.34+. Earlier versions need a mutating webhook
  shim. For now we ship as MAP and require K8s 1.34+ on AKS.
*/ -}}
apiVersion: admissionregistration.k8s.io/v1alpha1
kind: MutatingAdmissionPolicy
metadata:
  name: azureclaw-seccomp-auto-stamp
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
    namespaceSelector:
      matchLabels:
        azureclaw.azure.com/isolated: strict
  reinvocationPolicy: Never
  matchConditions:
    - name: missing-seccomp
      expression: |
        !has(object.spec.securityContext) ||
        !has(object.spec.securityContext.seccompProfile) ||
        object.spec.securityContext.seccompProfile.?type.orValue("") != "Localhost"
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: |
          Object{
            spec: Object.spec{
              securityContext: Object.spec.securityContext{
                seccompProfile: Object.spec.securityContext.seccompProfile{
                  type: "Localhost",
                  localhostProfile: "azureclaw-strict.json"
                }
              }
            }
          }
