# AzureClaw ToolPolicy CRD
#
# DO NOT EDIT BY HAND. This file is the helm-side mirror of the Rust
# schema in `controller/src/tool_policy.rs` plus the CEL rules in
# `controller/src/crd_validations.rs::tool_policy_validations`.
#
# Drift between this file and the Rust schema is caught at `cargo test`
# time by `controller/src/helm_drift.rs::helm_toolpolicy_crd_matches_rust_schema`.
# To regenerate after schema changes, run:
#
#   DUMP_TOOLPOLICY_CRD_YAML=1 cargo test --bin azureclaw-controller \
#       helm_drift::tests::dump_toolpolicy_crd_yaml -- --nocapture
#
# and replace the body below with the captured YAML.
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: toolpolicies.azureclaw.azure.com
  labels:
    app.kubernetes.io/name: azureclaw
    app.kubernetes.io/component: crd
spec:
  group: azureclaw.azure.com
  names:
    categories: []
    kind: ToolPolicy
    plural: toolpolicies
    shortNames:
    - tp
    singular: toolpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.appliesTo.tool
      name: Tool
      type: string
    - jsonPath: .spec.commerce.dailyCap
      name: DailyCap
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for ToolPolicySpec via `CustomResource`
        properties:
          spec:
            description: |-
              `ToolPolicy.spec` — declares per-tool gating: rate limits, approval,
              and AP2 commerce caps. Resolves bottom-up (most-specific selector
              wins). See `docs/api/lifecycle.md` for resolution semantics.
            properties:
              agtProfile:
                description: |-
                  Customer-supplied AGT policy profile. When present, the
                  controller writes the raw profile bytes into the compiled
                  ConfigMap under key `agt-profile.yaml` and the sandbox
                  inference-router loads it via the AGT policy engine. Replaces
                  the bundled `AGT_POLICY_PROFILE` env-var path (deprecated).

                  Slice 1b ships **inline** only; `bundleRef` (signed OCI
                  artifact fetch) lands in Slice 1c. The wire contract between
                  controller and router is the length-prefixed sha256 digest
                  produced by [`crate::tool_policy_compile::agt_profile_digest`],
                  echoed back by the router via `GET /internal/policy-status`.

                  Per principles.md §3: when `agtProfile` is set, the controller
                  stamps `phase=Compiled` and `Ready=False /
                  reason=AwaitingRouterEnforcement` until the router-confirmation
                  poller (Slice 1c) closes the loop.
                nullable: true
                properties:
                  inline:
                    description: |-
                      Inline AGT policy YAML body. Plain string — admission validates
                      it is non-empty; the router parses it at load time and surfaces
                      any syntax error via `GET /internal/policy-status`.
                    nullable: true
                    type: string
                type: object
              appliesTo:
                description: |-
                  Selector: which tool calls this policy applies to. AND of tool name,
                  MCP server, and sandbox label-selector.
                properties:
                  mcpServer:
                    description: |-
                      MCP server name (`McpServer.metadata.name`) the tool must come
                      from. Empty means any.
                    nullable: true
                    type: string
                  sandboxMatchLabels:
                    additionalProperties:
                      type: string
                    default: {}
                    description: Sandbox label selector. AND with the other fields.
                    type: object
                  tool:
                    description: Tool name as advertised by the MCP server. `"*"` matches all.
                    nullable: true
                    type: string
                type: object
              approval:
                description: 'Approval policy: human-in-the-loop confirmation step.'
                nullable: true
                properties:
                  channel:
                    description: Approval channel reference, e.g. Telegram bot, email.
                    nullable: true
                    type: string
                  mode:
                    description: |-
                      Approval required: `never` | `always` | `aboveThreshold`.
                      Default `aboveThreshold` when commerce is set.
                    nullable: true
                    type: string
                  threshold:
                    description: |-
                      Threshold value (currency string) above which approval is
                      required. Only meaningful when `mode == "aboveThreshold"`.
                    nullable: true
                    type: string
                type: object
              commerce:
                description: |-
                  AP2 commerce caps. Optional — present only for tools that move
                  money / commit purchases / sign transfers.
                nullable: true
                properties:
                  counterpartyAllowlist:
                    default: []
                    description: |-
                      Counterparty allowlist. Empty = deny-all (fail-closed).
                      Format: AP2 counterparty identifier (DID or domain).
                    items:
                      type: string
                    type: array
                  dailyCap:
                    description: |-
                      Daily spend cap as ISO-4217 currency string with 2-decimal-place
                      integer minor units, e.g. `"USD 100.00"`. Parser is strict;
                      admission CEL rejects malformed values at apply time.
                    nullable: true
                    type: string
                  monthlyCap:
                    description: Monthly spend cap. Must be >= dailyCap (admission CEL).
                    nullable: true
                    type: string
                  perTransferCap:
                    description: |-
                      Per-transfer hard cap. Even within daily/monthly, a single
                      transfer above this is refused.
                    nullable: true
                    type: string
                type: object
              displayName:
                description: Optional human-readable label.
                nullable: true
                type: string
              rateLimit:
                description: Rate-limit configuration. Resolved by AGT RateLimiter.
                nullable: true
                properties:
                  burst:
                    description: Burst (token bucket size).
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  rps:
                    description: Requests per second across all matching invocations.
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  window:
                    description: Window for the counter, e.g. `"1m"`, `"1h"`, `"24h"`.
                    nullable: true
                    type: string
                type: object
            required:
            - appliesTo
            type: object
            x-kubernetes-validations:
            - message: spec.appliesTo.sandboxMatchLabels must contain at least one label
              reason: FieldValueInvalid
              rule: has(self.appliesTo.sandboxMatchLabels) && size(self.appliesTo.sandboxMatchLabels) > 0
          status:
            nullable: true
            properties:
              agtProfileDigest:
                description: |-
                  Length-prefixed sha256 digest (Slice 1a aggregate canonical
                  format) of the AGT profile bytes the controller published to
                  the compiled ConfigMap. Set only when
                  `spec.agtProfile.inline` is present. The router echoes this
                  digest on `GET /internal/policy-status` once it has loaded the
                  profile; the controller-side confirmation poller (Slice 1c)
                  uses it to promote `Compiled → Ready`.
                nullable: true
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: message is a human readable message indicating details about the transition. This may be an empty string.
                      type: string
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                nullable: true
                type: array
              lastCompiledAt:
                description: Last time the policy was compiled to an AGT profile and pushed.
                nullable: true
                type: string
              observedGeneration:
                description: '`metadata.generation` last successfully reconciled. KEP-1623.'
                format: int64
                nullable: true
                type: integer
              phase:
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: ToolPolicy
        type: object
    served: true
    storage: true
    subresources:
      status: {}


