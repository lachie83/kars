{{- if .Values.monitoring.inspektorGadget.enabled }}
# Inspektor Gadget DaemonSet — eBPF-powered runtime observability for AzureClaw sandboxes.
# Provides trace_exec, trace_open, trace_tcp, trace_dns, trace_mount gadgets
# for real-time monitoring of sandbox process/file/network activity.
#
# Deployed to kube-system (requires privileged access for eBPF).
# Use: kubectl gadget trace exec -n azureclaw-<sandbox-name>
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gadget
  namespace: kube-system
  labels:
    app.kubernetes.io/name: inspektor-gadget
    app.kubernetes.io/part-of: azureclaw
    k8s-app: gadget
spec:
  selector:
    matchLabels:
      k8s-app: gadget
  template:
    metadata:
      labels:
        k8s-app: gadget
        app.kubernetes.io/name: inspektor-gadget
    spec:
      serviceAccountName: gadget
      hostPID: true
      hostNetwork: true
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      containers:
        - name: gadget
          image: "{{ .Values.monitoring.inspektorGadget.image.repository }}:{{ .Values.monitoring.inspektorGadget.image.tag }}"
          imagePullPolicy: Always
          command: ["/entrypoint"]
          lifecycle:
            preStop:
              exec:
                command: ["/cleanup"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: GADGET_POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: INSPEKTOR_GADGET_VERSION
              value: "{{ .Values.monitoring.inspektorGadget.image.tag }}"
            - name: INSPEKTOR_GADGET_OPTION_HOOK_MODE
              value: auto
          securityContext:
            privileged: true
          volumeMounts:
            - name: host
              mountPath: /host
            - name: run
              mountPath: /run
            - name: modules
              mountPath: /lib/modules
            - name: debugfs
              mountPath: /sys/kernel/debug
            - name: cgroup
              mountPath: /sys/fs/cgroup
            - name: bpffs
              mountPath: /sys/fs/bpf
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: host
          hostPath:
            path: /
        - name: run
          hostPath:
            path: /run
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: modules
          hostPath:
            path: /lib/modules
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gadget
  namespace: kube-system
  labels:
    app.kubernetes.io/name: inspektor-gadget
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gadget
  labels:
    app.kubernetes.io/name: inspektor-gadget
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "pods"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["gadget.kinvolk.io"]
    resources: ["traces", "traces/status"]
    verbs: ["*"]
  - apiGroups: ["*"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets", "jobs", "cronjobs", "replicationcontrollers"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gadget
  labels:
    app.kubernetes.io/name: inspektor-gadget
subjects:
  - kind: ServiceAccount
    name: gadget
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: gadget
  apiGroup: rbac.authorization.k8s.io
{{- end }}
