# AzureClaw Helm Chart Values
# NOTE: For production, replace "latest" tags with specific image digests
#       (e.g., sha256:abc123...) and set pullPolicy to IfNotPresent.

# Controller configuration
controller:
  image:
    repository: azureclaw.azurecr.io/azureclaw-controller
    tag: "latest"  # Pin to digest in production
    pullPolicy: Always
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Inference router configuration
inferenceRouter:
  image:
    repository: azureclaw.azurecr.io/azureclaw-inference-router
    tag: "latest"
    pullPolicy: Always
  replicas: 2
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  azure:
    openai:
      endpoint: ""       # Azure OpenAI endpoint for dev mode (set via azureclaw onboard)
      deploymentName: "gpt-4.1"   # Default model for dev mode
    contentSafety:
      enabled: true
    promptShields:
      enabled: true

# Default sandbox configuration
sandbox:
  image:
    repository: azureclaw.azurecr.io/openclaw-sandbox
    tag: "latest"
    pullPolicy: Always
  isolation: "enhanced"  # standard | enhanced | confidential
  seccompProfile: "azureclaw-strict"
  # SELinux: empty = compatible with restricted PodSecurity (Approach C).
  # Set to "azureclaw_sandbox_t" only if you install a custom SELinux policy module
  # on nodes and switch namespace enforcement to baseline (Approach A).
  selinuxContext: ""
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  writablePaths:
    - /sandbox
    - /tmp
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

# Network policy defaults
networkPolicy:
  defaultDenyEgress: true
  allowedEndpoints:
    - name: azure-openai
      host: "*.openai.azure.com"
      port: 443
    - name: github
      host: "github.com"
      port: 443
      methods: ["GET"]
    - name: github-api
      host: "api.github.com"
      port: 443
      methods: ["GET"]
    # clawhub.com intentionally excluded — 12% malware rate (Atomic Stealer).
    # Skills must be curated at build time, not downloaded at runtime.
    # See: https://cybersecuritynews.com/openclaws-top-skill-malware/
    # openclaw.ai also excluded — prevents `curl | bash` install vectors.
    - name: npm-registry
      host: "registry.npmjs.org"
      port: 443
      methods: ["GET"]

# Mesh federation — enables external agents to pair and offload tasks.
# Enabled by default so `azureclaw pair add` works out-of-the-box. The
# controller joins the in-cluster relay on startup (leader-elected so only
# one replica connects per AMID). Set to false to opt out.
meshPeer:
  enabled: true             # Set to false to disable federation
  relayUrl: ""              # Override relay URL (default: ws://agentmesh-relay.agentmesh.svc.cluster.local:8765)
  clusterName: ""           # Display name shown to external agents during pairing

# Foundry configuration (set by azureclaw up --foundry-endpoint)
foundry:
  endpoint: ""            # e.g. https://my-resource.services.ai.azure.com — AI Services base
  projectEndpoint: ""     # e.g. https://my-resource.services.ai.azure.com/api/projects/my-project — for Memory, Agents, Indexes
  deployments: ""         # JSON array of deployment names, e.g. '["gpt-4.1","text-embedding-3-small"]'

# Azure AI Content Safety configuration
# Used for both Content Safety text analysis and Prompt Shields.
# Defaults to Foundry endpoint (Azure AI Services host Content Safety at the same URL).
contentSafety:
  endpoint: ""    # e.g. https://my-resource.cognitiveservices.azure.com — auto-detected from Foundry endpoint

# Monitoring
monitoring:
  enabled: true
  containerInsights: true
  prometheus:
    enabled: true
  grafana:
    enabled: false   # Set to true if you want Grafana dashboards
  inspektorGadget:
    enabled: false   # Install separately: kubectl gadget deploy
    image:
      repository: ghcr.io/inspektor-gadget/inspektor-gadget
      tag: "v0.37.0"
    gadgets:
      traceExec: true       # Monitor process execution in sandboxes
      traceOpen: true       # Track file opens for policy validation
      traceTcp: true        # Network flow monitoring per pod
      traceDns: true        # DNS snooping for policy bypass detection
      traceMount: true      # Detect mount attempts (should be blocked)

# Admission policies shipped with the chart.
# See internal Phase 1 plan §6 item 6 and §0.2 principle 9.
admission:
  nullProviderBlock:
    # Deploy the ValidatingAdmissionPolicy that rejects
    # spec.*.provider=(null|noop|disabled|none) on non-dev tenants.
    # Mirror of ci/no-null-provider-prod.sh (static scan); this is the
    # runtime enforcement. Requires Kubernetes >= 1.30 (VAP GA).
    # Opt-out per object via label: azureclaw.azure.com/dev-only: "true"
    enabled: true
  podExecBan:
    # Deploy ValidatingAdmissionPolicy that rejects kubectl exec /
    # attach / portforward / console against pods in sandbox namespaces
    # (labelled azureclaw.azure.com/isolated=strict). Prevents operator
    # shell-in-sandbox vector (MCP02 "tool poisoning" blast radius).
    # Break-glass: set azureclaw.azure.com/break-glass=true on the
    # namespace; admission bypasses (logged via audit policy).
    # Requires Kubernetes >= 1.30 (VAP GA).
    enabled: true
  sandboxPostureLock:
    # Deploy ValidatingAdmissionPolicy that blocks posture downgrades
    # on sandbox pods: flipping readOnlyRootFilesystem false, dropping
    # runAsNonRoot, removing seccompProfile, escalating privileged.
    # Applies to pods in namespaces labelled
    # azureclaw.azure.com/isolated=strict on UPDATE only (CREATE is
    # handled by the controller's own pod template).
    # Requires Kubernetes >= 1.30 (VAP GA).
    enabled: true
  seccompAutoStamp:
    # Deploy MutatingAdmissionPolicy that auto-stamps the
    # azureclaw-strict seccomp profile onto sandbox-namespace pods that
    # are missing it. Defense-in-depth on top of the controller's own
    # pod-template stamping and the sandboxPostureLock VAP.
    #
    # Requires Kubernetes >= 1.34 AND the `MutatingAdmissionPolicy`
    # feature gate enabled. The gate is still beta and OFF by default in
    # upstream K8s 1.34, and AKS does not expose it yet — so we default
    # to false. Flip to true once the API surface is available.
    enabled: false

# Azure-specific configuration
azure:
  workloadIdentity:
    enabled: true
    clientId: ""    # Set by azureclaw up from Bicep outputs
  keyVaultCsi:
    enabled: true
    keyVaultName: ""    # Set via azureclaw init
  policy:
    enabled: true
  # Compliance: azure-osconfig integration (TODO)
  osconfig:
    enabled: false      # TODO: enable when azure-osconfig integration is ready
    benchmark: "CIS_AKS_Optimized_Azure_Linux_3"
  # Entra Agent ID auth for AGT mesh (api://agentmesh).
  # When `enabled: false` (default), sandboxes skip the Workload Identity
  # → Entra token exchange entirely and register with the AGT registry as
  # anonymous tier. This avoids a ~123-second startup timeout on clusters
  # where the `api://agentmesh` Entra app registration is not provisioned.
  # Flip to `enabled: true` once Entra Agent ID provisioning has been
  # completed end-to-end (see docs/security-audits/2026-04-26-entra-auth-toggle.md).
  entraAuth:
    enabled: false

# Cilium-related toggles. AKS clusters with Azure CNI Powered by Cilium
# get this for free; vanilla Azure CNI does not. Default off so the
# helm chart still installs on a vanilla cluster — the equivalent
# CiliumNetworkPolicy is then emitted per-sandbox by the controller.
cilium:
  enabled: false
