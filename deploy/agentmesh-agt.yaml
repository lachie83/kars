# AGT upstream relay + registry — Phase 4 of the agentmesh provider swap.
#
# This manifest deploys the upstream Microsoft Agent Governance Toolkit
# (AGT) Python relay+registry instead of our vendored Rust implementations.
#
# Selection: kubectl apply ONLY ONE of agentmesh.yaml OR agentmesh-agt.yaml.
# Both expose the same Service names (agentmesh-registry, agentmesh-relay)
# in the same namespace (agentmesh), so the inference router and the
# sandbox plugin connect identically. The wire protocol (AgentMesh Wire
# v1.0) is shared between vendored and upstream — confirmed in upstream
# MeshClient header which calls out kars compatibility features.
#
# Image source: build from the AGT clone at
#   /agent-governance-toolkit/agent-governance-python/agent-mesh/docker/Dockerfile
# with --build-arg COMPONENT=registry|relay, then tag and push as:
#   karsacr.azurecr.io/agentmesh-registry-agt:latest
#   karsacr.azurecr.io/agentmesh-relay-agt:latest
#
# Registry HTTP port: 8082 (upstream default). Relay WebSocket port: 8083.
# We re-map these to the same Service ports our router/router-helpers expect
# (registry 8080, relay 8765) so no router-side change is needed.
---
apiVersion: v1
kind: Namespace
metadata:
  name: agentmesh
  labels:
    kars.azure.com/managed: "true"
    kars.azure.com/mesh-provider: "agt"
---
# AGT upstream registry (Python FastAPI)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: agentmesh
  labels:
    kars.azure.com/mesh-provider: agt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentmesh-registry
  template:
    metadata:
      labels:
        app: agentmesh-registry
        kars.azure.com/mesh-provider: agt
    spec:
      containers:
        - name: registry
          # NOTE: blocked from switching to the official
          # ghcr.io/microsoft/agentmesh/registry:4.0.0 image — verified
          # 2026-06-02 on AKS, run 20260602T061744Z. Official 4.0.0
          # REQUIRES proof-of-possession on /v1/agents/register
          # ({public_key, proof, proof_timestamp}); AGT TypeScript SDK
          # 4.0.0 still sends the legacy {did, public_key} shape, so
          # every sandbox registration fails with 422, the auto-reconnect
          # loop floods the inbox, and the agent never reaches the model.
          # Re-test the swap once the SDK upstream adds POP-signing
          # (track via ci/check-agt-released.sh).
          image: karsacr.azurecr.io/agentmesh-registry-agt:latest
          ports:
            - containerPort: 8082
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8082"
            - name: LOG_LEVEL
              value: "info"
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agentmesh-registry
  namespace: agentmesh
spec:
  selector:
    app: agentmesh-registry
  ports:
    # Keep the external port at 8080 so router/router-helpers and existing
    # ConfigMaps don't need to change. The container actually listens on 8082.
    - port: 8080
      targetPort: 8082
---
# AGT upstream relay (Python FastAPI WebSocket)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay
  namespace: agentmesh
  labels:
    kars.azure.com/mesh-provider: agt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentmesh-relay
  template:
    metadata:
      labels:
        app: agentmesh-relay
        kars.azure.com/mesh-provider: agt
    spec:
      containers:
        - name: relay
          # NOTE: Pairs with the registry above — both must match the
          # same AGT schema. The SDK-vs-registry POP gap (see registry
          # comment) means we can't take official 4.0.0 yet; keep the
          # kars-built relay so the pair stays consistent.
          image: karsacr.azurecr.io/agentmesh-relay-agt:latest
          ports:
            - containerPort: 8083
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8083"
            - name: LOG_LEVEL
              value: "info"
            - name: REGISTRY_URL
              value: "http://agentmesh-registry.agentmesh.svc.cluster.local:8080"
            - name: REQUIRE_REGISTRATION
              value: "true"
            # Temporary escape hatch — AGT relay commit 66918631 (May 28 2026)
            # made DID proof-of-possession (public_key+timestamp+signature in
            # the connect frame) MANDATORY by default. The AGT TypeScript SDK
            # (the one we ship via vendor/agt/microsoft-agent-governance-sdk-
            # 4.0.0-agt-bae5de3.tgz) does NOT yet sign the connect frame, so
            # every WS connect is rejected and the SDK's auto-reconnect loop
            # floods the agent's inbox with `security_event` entries (the
            # "11,721 events / 40 min" incident, 2026-06-02).
            # Re-enable POP HERE the moment the SDK upstream lands POP-signing
            # in the connect frame — track in audit
            # docs/internal/security-audits/2026-06-02-agt-relay-pop-flood.md
            - name: AGENTMESH_RELAY_ALLOW_UNAUTHED_DID
              value: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agentmesh-relay
  namespace: agentmesh
spec:
  selector:
    app: agentmesh-relay
  ports:
    # Keep external port 8765 (matches existing router config) → container 8083.
    - port: 8765
      targetPort: 8083
