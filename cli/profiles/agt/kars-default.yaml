# Kars AGT Governance Policy — agentmesh PolicyEngine format
#
# Uses agentmesh PolicyEngine action-pattern matching (glob: shell:*, inference:*).
# Rules are evaluated by priority (higher = first); first match wins.
# Type: capability (allow/deny lists), approval, rate_limit.
#
# Action format used by Kars router:
#   inference:chat_completions:<model>   inference:responses:<model>
#   image_generation:<deployment>        spawn:create:<name>
#   shell:<command>                      tool:<tool_name>
#   mesh:send:<peer>   mesh:receive      admin:<operation>
#
# Infrastructure controls (network, filesystem, IMDS, content safety, tokens)
# are handled by Kars at kernel/router level — not duplicated here.

version: "1.0"
agent: kars-default

policies:
  # ── Shell safety ─────────────────────────────────────────────────────
  # Deny dangerous shell patterns before allowing safe ones.
  - name: shell-destructive-deny
    type: capability
    denied_actions:
      - "shell:rm"
      - "shell:mkfs"
      - "shell:shutdown"
      - "shell:reboot"
      - "shell:dd"
      - "shell:nmap"
      - "shell:nc"
      - "shell:netcat"
      - "shell:socat"
      - "shell:nsenter"
      - "shell:unshare"
      - "shell:chroot"
    priority: 100

  - name: shell-safe-commands
    type: capability
    allowed_actions:
      - "shell:ls"
      - "shell:cat"
      - "shell:grep"
      - "shell:find"
      - "shell:echo"
      - "shell:head"
      - "shell:tail"
      - "shell:wc"
      - "shell:sort"
      - "shell:uniq"
      - "shell:diff"
      - "shell:python"
      - "shell:python3"
      - "shell:pip"
      - "shell:node"
      - "shell:npm"
      - "shell:git"
      - "shell:curl"
      - "shell:jq"
      - "shell:sed"
      - "shell:awk"
    priority: 90

  # ── Inference ────────────────────────────────────────────────────────
  - name: inference-allow
    type: capability
    allowed_actions:
      - "inference:*"
      - "image_generation:*"
    priority: 80

  # ── Foundry tools ────────────────────────────────────────────────────
  - name: foundry-allow
    type: capability
    allowed_actions:
      - "foundry:web_search:*"
      - "foundry:code_execute:*"
      - "foundry:file_search:*"
      - "foundry:memory:*"
      - "foundry:image_generation:*"
      - "foundry:conversations:*"
      - "foundry:evaluations:*"
      - "foundry:deployments:*"
      - "foundry:agents:*"
    priority: 80

  # ── Sub-agent spawning ──────────────────────────────────────────────
  - name: spawn-allow
    type: capability
    allowed_actions:
      - "spawn:*"
    priority: 80

  # ── Mesh messaging ──────────────────────────────────────────────────
  - name: mesh-allow
    type: capability
    allowed_actions:
      - "mesh:*"
    priority: 80

  # ── Tool calls ──────────────────────────────────────────────────────
  # Handoff tools are allowed — the handoff flow itself has a two-step
  # confirmation code mechanism (request → code → confirm) that prevents
  # unauthorized handoff via prompt injection.  A separate approval gate
  # can be re-enabled once the native approval UI is wired up.
  - name: tool-allow
    type: capability
    allowed_actions:
      - "tool:*"
    priority: 70

  # ── Admin operations ────────────────────────────────────────────────
  # Bulk/promote operations need human approval.
  - name: admin-bulk-approval
    type: approval
    actions:
      - "admin:bulk*"
      - "admin:promote*"
    min_approvals: 1
    priority: 60

  - name: admin-allow
    type: capability
    allowed_actions:
      - "admin:*"
    priority: 50

  # ── Inference rate limit (per-agent, 60s window) ────────────────────
  - name: inference-rate-limit
    type: rate_limit
    actions:
      - "inference:*"
    max_calls: 500
    window: "60s"
    priority: 40

# NOT included — Kars handles these at infrastructure level:
# ✗ network-policy (iptables + NetworkPolicy — kernel-level enforcement)
# ✗ filesystem-scope (read-only rootfs — OS-level enforcement)
# ✗ content-safety (Azure AI Content Safety — router-level enforcement)
# ✗ token-budgets (inference router — router-level enforcement)
# ✗ IMDS-blocking (iptables UID-based — kernel-level enforcement)
