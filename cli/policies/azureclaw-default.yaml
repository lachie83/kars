# AzureClaw AGT Governance Policy — Application Layer Only
#
# Infrastructure controls (network, filesystem, IMDS, content safety, tokens)
# are handled by AzureClaw at kernel/router level. AGT only governs
# application-level behavior that AzureClaw can't see.
#
# Rule: If AzureClaw enforces it at kernel/network/router, AGT doesn't touch it.

version: "1.0"
agent: openclaw
description: AzureClaw behavioral governance (tool-level only, no infra overlap)

policies:
  # Tool-level restrictions — AzureClaw CAN'T see tool calls before execution
  - name: shell-safety
    type: capability
    allowed_actions:
      - "shell:ls"
      - "shell:cat"
      - "shell:grep"
      - "shell:find"
      - "shell:echo"
      - "shell:head"
      - "shell:tail"
      - "shell:wc"
      - "shell:sort"
      - "shell:uniq"
      - "shell:diff"
      - "shell:python"
      - "shell:python3"
      - "shell:pip"
      - "shell:node"
      - "shell:npm"
      - "shell:git"
      - "shell:curl"
      - "shell:jq"
      - "shell:sed"
      - "shell:awk"
    denied_actions:
      - "shell:rm -rf /*"
      - "shell:rm -rf /"
      - "shell:dd"
      - "shell:mkfs"
      - "shell:shutdown"
      - "shell:reboot"
      - "shell:chmod 777"
      - "shell:chown"
      - "shell:mount"
      - "shell:umount"

  # Destructive operations require approval
  - name: destructive-approval
    type: approval
    actions:
      - "delete_*"
      - "shell:rm *"
      - "file:write:.env"
      - "file:write:.bashrc"
    min_approvals: 1
    approval_timeout_minutes: 15

  # Tool-specific rate limits (different from AzureClaw's token budget)
  - name: tool-rate-limit
    type: rate_limit
    scope: tool_calls
    max_calls: 20
    window: 1m
    actions: ["shell:*"]

  # ── Issues #7, #8: Inference + spawn policy gates ────────────────────────

  # Inference rate limit — cap chat completions per minute (#12b)
  - name: inference-rate-limit
    type: rate_limit
    max_calls: 60
    window: 1m
    actions: ["inference:chat_completions:*"]

  # Spawn cap — max concurrent sub-agents (#8)
  - name: spawn-limit
    type: rate_limit
    max_calls: 5
    window: 1h
    actions: ["spawn:create:*"]

  # ── Issue #9: Response validation ────────────────────────────────────────

  # Block prompt injection patterns in model responses
  - name: response-content-safety
    type: pattern
    scope: output
    blocked_patterns:
      - "ignore previous instructions"
      - "ignore all prior"
      - "you are now"
      - "new system prompt"
      - "DROP TABLE"
      - "UNION SELECT"
      - "rm -rf /"
      - "; curl "
      - "<script>"

  # ── Issue #10: Mesh message policy ───────────────────────────────────────

  # Require trust verification for incoming mesh messages
  - name: mesh-receive-trust
    type: capability
    match:
      pattern: "mesh:receive:.*"
    config:
      require_trust_score: 300

  # ── Issue #14: Bulk promote gate ─────────────────────────────────────────

  # Bulk operations (promote, enforce, delete-all) require approval
  - name: bulk-operations-approval
    type: approval
    actions:
      - "egress:enforce"
      - "egress:approve_all"
      - "admin:promote"
      - "admin:bulk_*"
    min_approvals: 1
    approval_timeout_minutes: 30

  # NOT included — AzureClaw handles these at infrastructure level:
  # ✗ network-policy (iptables + NetworkPolicy — kernel-level enforcement)
  # ✗ filesystem-scope (read-only rootfs — OS-level enforcement)
  # ✗ content-safety (Azure AI Content Safety — router-level enforcement)
  # ✗ token-budgets (inference router — router-level enforcement)
  # ✗ IMDS-blocking (iptables UID-based — kernel-level enforcement)
  # ✗ rate-limit for API calls (ConcurrencyLimitLayer — router-level enforcement)
