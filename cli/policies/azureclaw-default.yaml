# AzureClaw AGT Governance Policy — Application Layer Only
#
# Uses agentmesh PolicyEngine condition expressions (field == 'value',
# boolean fields, and/or compound). The sidecar pre-processes incoming
# action strings into structured context dicts for evaluation.
#
# Infrastructure controls (network, filesystem, IMDS, content safety, tokens)
# are handled by AzureClaw at kernel/router level.
#
# Rule: If AzureClaw enforces it at kernel/network/router, AGT doesn't touch it.

name: azureclaw-default
description: AzureClaw behavioral governance (tool-level only, no infra overlap)
agents: ["*"]
default_action: deny

rules:
  # ── Shell safety: allow known-safe commands ──────────────────────────────
  - name: shell-safe-commands
    condition: "action.category == 'shell' and action.safe"
    action: allow
    priority: 100
    description: "Allow pre-approved shell commands (ls, cat, grep, etc.)"

  - name: shell-destructive-deny
    condition: "action.category == 'shell' and action.destructive"
    action: deny
    priority: 200
    description: "Deny destructive shell commands (rm -rf, dd, mkfs, etc.)"

  - name: shell-unknown-warn
    condition: "action.category == 'shell'"
    action: deny
    priority: 50
    description: "Deny-by-default for unrecognised shell commands"

  # ── Destructive file operations require approval ─────────────────────────
  - name: destructive-approval
    condition: "action.destructive"
    action: require_approval
    priority: 190
    approvers: ["operator"]
    description: "Destructive operations require operator approval"

  # ── Inference rate limit (#7, #12) ───────────────────────────────────────
  - name: inference-rate-limit
    condition: "action.category == 'inference'"
    action: allow
    limit: "60/minute"
    priority: 80
    description: "Cap chat completions at 60 per minute"

  # ── Spawn limit (#8) ────────────────────────────────────────────────────
  - name: spawn-limit
    condition: "action.category == 'spawn'"
    action: allow
    limit: "5/hour"
    priority: 80
    description: "Cap sub-agent spawns at 5 per hour"

  # ── Response content safety (#9) ─────────────────────────────────────────
  - name: response-content-safety
    condition: "action.category == 'output' and action.injection_detected"
    action: deny
    priority: 210
    description: "Block model responses containing prompt injection patterns"

  - name: response-allow
    condition: "action.category == 'output'"
    action: allow
    priority: 40
    description: "Allow clean model output"

  # ── Mesh message policy (#10) ────────────────────────────────────────────
  - name: mesh-receive-untrusted
    condition: "action.category == 'mesh' and action.untrusted"
    action: deny
    priority: 180
    description: "Deny messages from agents below trust threshold"

  - name: mesh-receive-trusted
    condition: "action.category == 'mesh'"
    action: allow
    priority: 70
    description: "Allow messages from trusted agents"

  # ── Bulk operations gate (#14) ───────────────────────────────────────────
  - name: bulk-operations-approval
    condition: "action.category == 'admin' and action.bulk"
    action: require_approval
    priority: 170
    approvers: ["operator"]
    description: "Bulk admin operations require operator approval"

  - name: admin-allow
    condition: "action.category == 'admin'"
    action: allow
    priority: 60
    description: "Allow non-bulk admin operations"

# NOT included — AzureClaw handles these at infrastructure level:
# ✗ network-policy (iptables + NetworkPolicy — kernel-level enforcement)
# ✗ filesystem-scope (read-only rootfs — OS-level enforcement)
# ✗ content-safety (Azure AI Content Safety — router-level enforcement)
# ✗ token-budgets (inference router — router-level enforcement)
# ✗ IMDS-blocking (iptables UID-based — kernel-level enforcement)
# ✗ rate-limit for API calls (ConcurrencyLimitLayer — router-level enforcement)
