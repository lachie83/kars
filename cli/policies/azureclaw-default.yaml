# AzureClaw AGT Governance Policy — Native TrustPolicy Format
#
# Uses agentmesh TrustPolicy + PolicyEvaluator with TrustCondition operators:
#   eq, ne, gt, gte, lt, lte, in, not_in, matches (regex)
# All classification (safe commands, destructive patterns, injection detection)
# is done by AGT's native condition evaluation — zero custom logic.
#
# Infrastructure controls (network, filesystem, IMDS, content safety, tokens)
# are handled by AzureClaw at kernel/router level.

name: azureclaw-default
description: AzureClaw behavioral governance (tool-level only, no infra overlap)

defaults:
  min_trust_score: 500
  max_delegation_depth: 3
  require_handshake: true

rules:
  # ── Shell safety ─────────────────────────────────────────────────────
  - name: shell-safe-commands
    description: Allow pre-approved shell commands
    condition:
      field: action.command
      operator: in
      value: [ls, cat, grep, find, echo, head, tail, wc, sort, uniq, diff,
              python, python3, pip, node, npm, git, curl, jq, sed, awk]
    action: allow
    priority: 10

  - name: shell-destructive-deny
    description: Deny destructive shell commands (regex match)
    condition:
      field: action.full
      operator: matches
      value: "rm\\s+-rf\\s+/|mkfs|shutdown|reboot|chmod\\s+777|dd\\s+if="
    action: deny
    priority: 5

  - name: shell-sensitive-file-deny
    description: Deny access to sensitive system files
    condition:
      field: action.full
      operator: matches
      value: "/etc/shadow|/etc/gshadow|/etc/sudoers|/root/\\.ssh|/proc/[0-9]+/environ"
    action: deny
    priority: 5

  - name: shell-recon-deny
    description: Deny network reconnaissance and reverse shell tools
    condition:
      field: action.full
      operator: matches
      value: "\\bnmap\\b|\\bnc\\s+-[elp]|\\bnetcat\\b|\\bsocat\\b|\\bnsenter\\b|\\bunshare\\b|\\bchroot\\b"
    action: deny
    priority: 5

  - name: network-metadata-deny
    description: Deny access to cloud metadata endpoints
    condition:
      field: action.full
      operator: matches
      value: "169\\.254\\.169\\.254|metadata\\.google\\.internal"
    action: deny
    priority: 5

  # ── Inference rate-limited allow (#7, #12) ───────────────────────────
  - name: inference-allow
    description: Allow inference requests (rate limiting via RateLimiter)
    condition:
      field: action.category
      operator: eq
      value: inference
    action: allow
    priority: 20

  # ── Spawn allow (#8) ────────────────────────────────────────────────
  - name: spawn-allow
    description: Allow sub-agent spawns (rate limiting via RateLimiter)
    condition:
      field: action.category
      operator: eq
      value: spawn
    action: allow
    priority: 20

  # ── Response content safety (#9) ────────────────────────────────────
  - name: output-injection-deny
    description: Block model responses containing prompt injection patterns
    condition:
      field: action.detail
      operator: matches
      value: "(?i)ignore previous instructions|ignore all prior|you are now|new system prompt|DROP TABLE|UNION SELECT|rm -rf /|; curl |<script>"
    action: deny
    priority: 5

  - name: output-clean-allow
    description: Allow clean model output
    condition:
      field: action.category
      operator: eq
      value: output
    action: allow
    priority: 30

  # ── Mesh message policy (#10) ───────────────────────────────────────
  - name: mesh-untrusted-deny
    description: Deny messages from agents below trust threshold
    condition:
      field: trust_score
      operator: lt
      value: 500
    action: deny
    priority: 5

  - name: mesh-trusted-allow
    description: Allow messages from trusted agents
    condition:
      field: action.category
      operator: eq
      value: mesh
    action: allow
    priority: 20

  # ── Bulk operations gate (#14) ──────────────────────────────────────
  - name: admin-bulk-approval
    description: Bulk admin operations require operator approval
    condition:
      field: action.detail
      operator: matches
      value: "^(bulk|promote)"
    action: require_approval
    priority: 10

  - name: admin-allow
    description: Allow non-bulk admin operations
    condition:
      field: action.category
      operator: eq
      value: admin
    action: allow
    priority: 25

# NOT included — AzureClaw handles these at infrastructure level:
# ✗ network-policy (iptables + NetworkPolicy — kernel-level enforcement)
# ✗ filesystem-scope (read-only rootfs — OS-level enforcement)
# ✗ content-safety (Azure AI Content Safety — router-level enforcement)
# ✗ token-budgets (inference router — router-level enforcement)
# ✗ IMDS-blocking (iptables UID-based — kernel-level enforcement)
