# Null-provider admission fixtures — positive case.
# Dev-labelled KarsSandbox explicitly opts into a null provider. The
# ValidatingAdmissionPolicy in deploy/helm/kars/templates/
# admission-null-provider.yaml must ACCEPT this manifest.
---
apiVersion: kars.azure.com/v1alpha1
kind: InferencePolicy
metadata:
  name: dev-null-provider-ok-inference
  namespace: kars-fixtures
  labels:
    kars.azure.com/sandbox: dev-null-provider-ok
spec:
  appliesTo:
    sandboxName: dev-null-provider-ok
  modelPreference:
    primary:
      provider: azure-openai
      deployment: gpt-4.1
      endpoint: "https://example.openai.azure.com"
---
apiVersion: kars.azure.com/v1alpha1
kind: KarsSandbox
metadata:
  name: dev-null-provider-ok
  namespace: kars-fixtures
  labels:
    kars.azure.com/dev-only: "true"
spec:
  runtime:
    kind: OpenClaw
    openclaw:
      version: "0.1"
  sandbox:
    isolation: strict
  inferenceRef:
    name: dev-null-provider-ok-inference
  # Forward-compatible with Phase 1 CRD schema; current v1alpha1 has
  # x-kubernetes-preserve-unknown-fields on spec, so this is accepted.
  agt:
    providers:
      mesh: null
      policy: vendored
      audit: vendored
      signing: vendored
