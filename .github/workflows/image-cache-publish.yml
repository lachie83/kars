name: Image Cache Publish

# Publishes the long-lived build artefacts (sandbox base image, inference router
# image, controller image) to GHCR so the Container Image Scan job in ci.yml
# can pull known-good prebuilt images instead of rebuilding every Rust/Docker
# layer from scratch on every PR. Public-CI rebuilds are slow and brittle —
# they transitively depend on upstream npm / crates.io / network availability.
#
# Visibility: each package should be marked PRIVATE in the GitHub UI under
# Packages → <name> → Package settings → Change visibility → Private. CI in
# this repo can still pull private GHCR images using the auto-provided
# GITHUB_TOKEN (no extra secrets needed).

on:
  push:
    branches: [dev, main]
    paths:
      - 'sandbox-images/openclaw/Dockerfile.base'
      - 'vendor/sandbox-wheels/**'
      - 'inference-router/**'
      - 'controller/**'
      - 'a2a-gateway/**'
      - 'azureclaw-a2a-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/image-cache-publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: sandbox-base
            suffix: -sandbox-base
            dockerfile: sandbox-images/openclaw/Dockerfile.base
            paths: 'sandbox-images/openclaw/Dockerfile.base vendor/sandbox-wheels/'
          - name: inference-router
            suffix: -inference-router
            dockerfile: inference-router/Dockerfile
            paths: 'inference-router/ Cargo.toml Cargo.lock'
          - name: controller
            suffix: -controller
            dockerfile: controller/Dockerfile
            paths: 'controller/ Cargo.toml Cargo.lock'
          - name: a2a-gateway
            suffix: -a2a-gateway
            dockerfile: a2a-gateway/Dockerfile
            paths: 'a2a-gateway/ azureclaw-a2a-core/ Cargo.toml Cargo.lock'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Skip when no relevant paths changed
        id: changed
        run: |
          # On workflow_dispatch always run; on push only run if relevant paths changed.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only HEAD~1 HEAD -- ${{ matrix.image.paths }} | grep -q .; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${{ matrix.image.name }} — no changes in ${{ matrix.image.paths }}"
          fi

      - name: Log in to GHCR
        if: steps.changed.outputs.run == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        if: steps.changed.outputs.run == 'true'
        id: tags
        run: |
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          IMG="ghcr.io/${REPO_LOWER}${{ matrix.image.suffix }}"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$IMG:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=$IMG:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          if [ "$GITHUB_REF_NAME" = "main" ] || [ "$GITHUB_REF_NAME" = "dev" ]; then
            echo "latest_tag=$IMG:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push ${{ matrix.image.name }}
        if: steps.changed.outputs.run == 'true'
        run: |
          TAGS=( -t "${{ steps.tags.outputs.sha_tag }}" -t "${{ steps.tags.outputs.branch_tag }}" )
          if [ -n "${{ steps.tags.outputs.latest_tag }}" ]; then
            TAGS+=( -t "${{ steps.tags.outputs.latest_tag }}" )
          fi
          docker build "${TAGS[@]}" -f "${{ matrix.image.dockerfile }}" .
          for tag in "${{ steps.tags.outputs.sha_tag }}" "${{ steps.tags.outputs.branch_tag }}" "${{ steps.tags.outputs.latest_tag }}"; do
            [ -n "$tag" ] && docker push "$tag"
          done
