name: Image Cache Publish

# Publishes runtime container images (controller, inference-router,
# a2a-gateway, conformance-runner, sandbox-base) to GHCR so the
# Container Image Scan job in ci.yml and downstream consumers can
# pull known-good prebuilt images. Visibility: each package should
# be marked PRIVATE in the GitHub UI under Packages → <name> →
# Package settings → Change visibility → Private. CI in this repo
# can still pull private GHCR images using the auto-provided
# GITHUB_TOKEN (no extra secrets needed).
#
# Build-once pattern (Path B): `build-binaries` compiles the entire
# Rust workspace ONCE for the musl static target, then the matrix
# `publish-images` job COPY's the binaries into AL3 distroless images.
# Each matrix image build is ~30s instead of ~8min cargo build.

on:
  push:
    branches: [dev, main]
    paths:
      - 'sandbox-images/openclaw/Dockerfile.base'
      - 'vendor/sandbox-wheels/**'
      - 'inference-router/**'
      - 'controller/**'
      - 'a2a-gateway/**'
      - 'kars-a2a-core/**'
      - 'sandbox-images/conformance-runner/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/image-cache-publish.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build Rust binaries (host glibc, build-once)
    # Pinned to ubuntu-22.04 (glibc 2.35) so the binary runs on
    # AL3 distroless (glibc 2.38). Newer runners would emit glibc
    # 2.39 symbols that AL3 can't resolve.
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read   # checkout + cache + artifact upload
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-glibc-release
      - name: cargo build --release
        run: cargo build --release --workspace
      - name: Stage binaries (per-arch layout)
        run: |
          mkdir -p ./bin/amd64
          cp target/release/kars-controller         ./bin/amd64/
          cp target/release/kars-inference-router   ./bin/amd64/
          cp target/release/kars-a2a-gateway        ./bin/amd64/
          cp target/release/kars-conformance-runner ./bin/amd64/
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: kars-binaries-${{ github.sha }}
          path: ./bin/
          retention-days: 1

  publish-images:
    name: Build and publish ${{ matrix.image.name }}
    needs: build-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read    # checkout + download binaries artifact
      packages: write   # push images to GHCR
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: sandbox-base
            suffix: -sandbox-base
            dockerfile: sandbox-images/openclaw/Dockerfile.base
            needs_binaries: false
          - name: inference-router
            suffix: -inference-router
            dockerfile: inference-router/Dockerfile
            needs_binaries: true
          - name: controller
            suffix: -controller
            dockerfile: controller/Dockerfile
            needs_binaries: true
          - name: a2a-gateway
            suffix: -a2a-gateway
            dockerfile: a2a-gateway/Dockerfile
            needs_binaries: true
          - name: conformance-runner
            suffix: -conformance-runner
            dockerfile: sandbox-images/conformance-runner/Dockerfile
            needs_binaries: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download pre-built binaries
        if: matrix.image.needs_binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: kars-binaries-${{ github.sha }}
          path: ./bin/
      - name: chmod binaries
        if: matrix.image.needs_binaries
        run: find ./bin -type f -name 'kars-*' -exec chmod +x {} \;

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          IMG="ghcr.io/${REPO_LOWER}${{ matrix.image.suffix }}"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$IMG:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=$IMG:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          # NOTE: deliberately do NOT push `:latest` here. This is a CI build
          # CACHE workflow that produces amd64-only images; the public,
          # multi-arch `:latest` is owned exclusively by the release workflow
          # (release-public-interim.yml). Pushing `:latest` from here would
          # clobber the multi-arch release image with an amd64-only one and
          # break `kars dev --release` (default :latest) on arm64 / kind.

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.branch_tag }}
          # Sandbox-base still has its own GHA cache because it does
          # heavy work (vendor wheels, system deps). The Rust images
          # are short COPY Dockerfiles that build in <30s — no cache
          # needed.
          cache-from: ${{ matrix.image.needs_binaries && '' || format('type=gha,scope=image-{0}', matrix.image.name) }}
          cache-to: ${{ matrix.image.needs_binaries && '' || format('type=gha,scope=image-{0},mode=max', matrix.image.name) }}
