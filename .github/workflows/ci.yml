name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_call:      # allow reuse from release.yml
  workflow_dispatch:  # manual trigger

permissions:
  contents: read

jobs:
  rust-build:
    name: Rust Build & Test (Controller + Inference Router)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo build --release
      - run: cargo test --all

  cargo-audit:
    name: Rust Dependency Audit (RustSec advisories)
    runs-on: ubuntu-latest
    # Non-blocking on the PR (advisories can appear overnight) but visible in CI.
    # Promote to required-check once the advisory noise is triaged.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        run: cargo audit --deny warnings

  cli-build:
    name: CLI Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test
      # S17.A: SCA gate — fail on `high` or `critical` advisories in
      # CLI dependencies. Lower severities don't fail the build but
      # are visible in CI logs. Matches the cargo-audit job's posture
      # of denying warnings (cargo's default warning bar is roughly
      # equivalent to RUSTSEC `high`).
      - name: npm audit (CLI dependencies)
        run: npm audit --audit-level=high

  runtime-openclaw-build:
    name: Runtime OpenClaw Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtimes/openclaw
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - name: npm audit (Runtime OpenClaw dependencies)
        run: npm audit --audit-level=high

  mesh-plugin-build:
    name: Mesh Plugin Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mesh-plugin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: npm install
      - run: cd ../vendor/agentmesh-sdk && npm install --ignore-scripts
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - name: npm audit (Mesh Plugin dependencies)
        working-directory: mesh-plugin
        run: npm audit --audit-level=high

  python-sidecar:
    name: Python Lint & Test (AGT Sidecar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check for AGT sidecar code
        id: check
        run: |
          if [ -f agt-sidecar/pyproject.toml ] || [ -f agt-sidecar/requirements.txt ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AGT sidecar not yet present — skipping lint & test"
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: steps.check.outputs.exists == 'true'
        with:
          python-version: "3.12"
      - name: Install and test
        if: steps.check.outputs.exists == 'true'
        run: |
          cd agt-sidecar
          pip install -e ".[dev]"
          python -m ruff check .
          python -m pytest

  bicep-validate:
    name: Bicep Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: az bicep build --file deploy/bicep/main.bicep

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - run: helm lint deploy/helm/azureclaw

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Trivy vulnerability scanner
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Log in to GHCR (for cached image pulls)
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if inference router image needs rebuild
        id: router-check
        run: |
          if git diff --name-only HEAD~1 HEAD -- inference-router/ Cargo.toml Cargo.lock | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build inference router image (only when source changed)
        if: steps.router-check.outputs.changed == 'true'
        run: docker build -t azureclaw-inference-router:test -f inference-router/Dockerfile .

      - name: Pull cached inference router image (when source unchanged)
        if: steps.router-check.outputs.changed != 'true'
        run: |
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          GHCR_IMG="ghcr.io/${REPO_LOWER}-inference-router:latest"
          if docker pull "$GHCR_IMG" 2>/dev/null; then
            echo "Pulled cached inference router from GHCR: $GHCR_IMG"
            docker tag "$GHCR_IMG" azureclaw-inference-router:test
          else
            echo "::warning::No cached inference router image in GHCR — building locally"
            docker build -t azureclaw-inference-router:test -f inference-router/Dockerfile .
          fi

      - name: Check if base image needs rebuild
        id: base-check
        run: |
          if git diff --name-only HEAD~1 HEAD -- sandbox-images/openclaw/Dockerfile.base vendor/sandbox-wheels/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sandbox base image (only when Dockerfile.base changed)
        if: steps.base-check.outputs.changed == 'true'
        run: docker build -t azureclaw-sandbox-base:test -f sandbox-images/openclaw/Dockerfile.base .

      - name: Pull cached base image (when Dockerfile.base unchanged)
        if: steps.base-check.outputs.changed != 'true'
        run: |
          # Pull from GHCR (published by image-cache-publish.yml on dev/main).
          # Falls back to local build only if the image isn't available yet
          # (e.g. before the first publish run, or for forks without access).
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          GHCR_IMG="ghcr.io/${REPO_LOWER}-sandbox-base:latest"
          ACR_IMG="azureclawacr.azurecr.io/azureclaw-sandbox-base:latest"
          if docker pull "$GHCR_IMG" 2>/dev/null; then
            echo "Pulled cached base image from GHCR: $GHCR_IMG"
            docker tag "$GHCR_IMG" azureclaw-sandbox-base:test
          elif docker pull "$ACR_IMG" 2>/dev/null; then
            echo "Pulled cached base image from ACR: $ACR_IMG"
            docker tag "$ACR_IMG" azureclaw-sandbox-base:test
          else
            echo "::warning::No cached base image available (GHCR or ACR) — building locally (slow)"
            docker build -t azureclaw-sandbox-base:test -f sandbox-images/openclaw/Dockerfile.base .
          fi

      - name: Build sandbox image
        run: docker build --build-arg SANDBOX_BASE_IMAGE=azureclaw-sandbox-base:test --build-arg INFERENCE_ROUTER_IMAGE=azureclaw-inference-router:test -t azureclaw-sandbox:test -f sandbox-images/openclaw/Dockerfile .

      - name: Free disk space before scan
        run: |
          docker image rm azureclaw-sandbox-base:test azureclaw-inference-router:test 2>/dev/null || true
          docker builder prune -f 2>/dev/null || true

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "azureclaw-sandbox:test"
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "container-results.sarif"

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always() && hashFiles('container-results.sarif') != ''
        with:
          sarif_file: "container-results.sarif"

  dockerfile-lint:
    name: "Dockerfile Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint
      - name: Lint Dockerfiles
        run: |
          IGNORE="--ignore DL3008 --ignore DL3013 --ignore DL3018 --ignore DL3006 --ignore DL4006 --ignore DL3003 --ignore DL3016 --ignore DL3059 --ignore DL3062 --ignore SC2015 --ignore SC2028"
          hadolint $IGNORE controller/Dockerfile
          hadolint $IGNORE inference-router/Dockerfile
          hadolint $IGNORE sandbox-images/openclaw/Dockerfile.base
          hadolint $IGNORE sandbox-images/openclaw/Dockerfile
          hadolint $IGNORE vendor/agentmesh-relay/Dockerfile
          hadolint $IGNORE vendor/agentmesh-registry/Dockerfile
