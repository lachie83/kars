name: Image Build, Sign & SBOM

on:
  push:
    # Only fire for public-release tags (strict semver). Internal /
    # preview tags (v*-internal*, v*-preview*) go through
    # release-internal.yml which uses private GHCR — no ACR creds needed.
    # This workflow targets karsacr.azurecr.io which requires ACR_USERNAME
    # /ACR_PASSWORD secrets that won't exist until MCR namespace is
    # onboarded.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha*'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta*'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc*'
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag"
        required: true
        default: "0.1.0"

permissions:
  contents: read

env:
  REGISTRY: karsacr.azurecr.io
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  build-binaries:
    name: Build Rust binaries (host glibc)
    # Pinned to ubuntu-22.04 (glibc 2.35) so the binary runs on
    # AL3 distroless (glibc 2.38). Newer runners could emit symbols
    # AL3 can't resolve.
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-glibc-release
      - name: cargo build --release
        run: cargo build --release --workspace
      - name: Stage binaries (per-arch layout)
        run: |
          mkdir -p ./bin/amd64
          cp target/release/kars-controller         ./bin/amd64/
          cp target/release/kars-inference-router   ./bin/amd64/
          cp target/release/kars-a2a-gateway        ./bin/amd64/
          cp target/release/kars-conformance-runner ./bin/amd64/
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: kars-binaries-${{ github.sha }}
          path: ./bin/
          retention-days: 1

  build-sign-sbom:
    name: Build, Sign & SBOM
    needs: build-binaries
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for Notation signing with OIDC
    strategy:
      matrix:
        component:
          - name: controller
            dockerfile: controller/Dockerfile
            image: kars-controller
          - name: inference-router
            dockerfile: inference-router/Dockerfile
            image: kars-inference-router
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download pre-built binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: kars-binaries-${{ github.sha }}
          path: ./bin/
      - name: chmod binaries
        run: find ./bin -type f -name 'kars-*' -exec chmod +x {} \;

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to ACR
        uses: azure/docker-login@15c4aadf093404726ab2ff205b2cdd33fa6d054c # v2
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.component.image }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ matrix.component.image }}:latest
          build-args: |
            VERSION=${{ env.VERSION }}
          # Enable BuildKit SBOM attestation
          sbom: true
          provenance: true

      # ─── SBOM Generation ─────────────────────────────────────────────
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.REGISTRY }}/${{ matrix.component.image }}:${{ env.VERSION }}
          format: spdx-json
          output-file: sbom-${{ matrix.component.name }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.component.name }}
          path: sbom-${{ matrix.component.name }}.spdx.json

      # ─── Image Signing with Notation ──────────────────────────────────
      - name: Install Notation
        uses: notaryproject/notation-action/setup@b6fee73110795d6793253c673bd723f12bcf9bbb # v1
        with:
          version: "1.2.0"

      - name: Sign image with Notation
        uses: notaryproject/notation-action/sign@b6fee73110795d6793253c673bd723f12bcf9bbb # v1
        with:
          plugin_name: azure-kv
          plugin_url: https://github.com/Azure/notation-azure-kv/releases/download/v1.2.0/notation-azure-kv_1.2.0_linux_amd64.tar.gz
          key_id: ${{ secrets.NOTATION_KEY_ID }}
          target_artifact_reference: ${{ env.REGISTRY }}/${{ matrix.component.image }}:${{ env.VERSION }}

      - name: Verify signature
        run: |
          notation verify ${{ env.REGISTRY }}/${{ matrix.component.image }}:${{ env.VERSION }} \
            --trust-policy-file deploy/security/notation-trust-policy.json
