name: Release

on:
  push:
    # Only fire for public-release tags (semver). Internal/preview tags
    # use release-internal.yml which produces wall-off artefacts.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha*'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta*'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc*'

permissions:
  contents: write

jobs:
  ci:
    name: CI Suite
    uses: ./.github/workflows/ci.yml
    permissions:
      # Reusable workflows REQUIRE the caller to grant every permission
      # the callee declares at job level. ci.yml needs:
      #   - id-token: write (cosign-verify job)
      #   - actions: read (rust-build queries prior runs / cache)
      #   - security-events: write (CodeQL / Trivy SARIF uploads)
      contents: read
      security-events: write
      id-token: write
      actions: read
      packages: read

  create-release:
    name: Create GitHub Release
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine pre-release
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qiE '(alpha|beta)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          body: |
            See [CHANGELOG](./CHANGELOG.md) for details.
