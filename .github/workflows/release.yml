name: Release

on:
  # Superseded by release-public-interim.yml, which is now the single public
  # release pipeline (multi-arch GHCR images + signed GitHub Release + npm).
  # Kept dispatch-only so the old CI+release path stays available if ever
  # needed, but it no longer auto-fires on v* tags and races the new pipeline.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: CI Suite
    uses: ./.github/workflows/ci.yml
    permissions:
      # Reusable workflows REQUIRE the caller to grant every permission
      # the callee declares at job level. ci.yml needs:
      #   - id-token: write (cosign-verify job)
      #   - actions: read (rust-build queries prior runs / cache)
      #   - security-events: write (CodeQL / Trivy SARIF uploads)
      contents: read
      security-events: write
      id-token: write
      actions: read
      packages: read

  create-release:
    name: Create GitHub Release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release + upload assets
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine pre-release
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qiE '(alpha|beta)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          body: |
            See [CHANGELOG](./CHANGELOG.md) for details.
