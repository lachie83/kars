name: OpenSSF Scorecard

# OpenSSF Scorecard runs weekly + on push to main, but ONLY when the
# repository is public — Scorecard's GitHub-API calls 404 on private
# repos, which would otherwise leave a permanent red badge. The
# `if: !github.event.repository.private` gate on the analysis job
# skips cleanly while we're still in private staging; the workflow
# self-activates the moment the repo flips public.
on:
  push:
    branches: [main]
  schedule:
    # Mondays 06:30 UTC — re-evaluate weekly so the badge stays fresh.
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    # Skip on private repos — Scorecard cannot scan them. Once Azure/kars
    # flips to public, this becomes truthy and the scan runs normally.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
