name: GHCR Cleanup (one-shot)

# Deletes orphan azureclaw-* container packages left over from the
# pre-rename era. Manual trigger only. Once run, this file can be
# deleted from the repo (or kept as a record of the cleanup).
#
# Permissions:
#   packages: write is enough for DELETE on org packages owned by the
#   org that the runner has access to.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list deletions without performing them)'
        required: false
        default: 'true'

permissions:
  packages: write
  contents: read

jobs:
  cleanup:
    name: Delete orphan azureclaw-* GHCR packages
    runs-on: ubuntu-22.04
    steps:
      - name: Delete orphan packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          ORPHANS=(
            azureclaw-sandbox-base
            azureclaw-inference-router
            azureclaw-a2a-gateway
            azureclaw-controller
          )
          for pkg in "${ORPHANS[@]}"; do
            echo "::group::$pkg"
            if [ "$DRY" = "true" ]; then
              echo "DRY RUN — would DELETE orgs/Azure/packages/container/$pkg"
            else
              if gh api -X DELETE "orgs/Azure/packages/container/$pkg"; then
                echo "deleted $pkg"
              else
                echo "::warning::could not delete $pkg (may already be gone, or token lacks permission)"
              fi
            fi
            echo "::endgroup::"
          done

      - name: List remaining kars-* packages (sanity check)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api 'orgs/Azure/packages?package_type=container&per_page=100' \
            --jq '.[] | select(.name|startswith("kars-") or startswith("azureclaw-")) | "\(.name)  visibility=\(.visibility)  updated=\(.updated_at)  versions=\(.version_count)"' \
            || echo "::warning::list-packages failed; GITHUB_TOKEN may lack org:read"
